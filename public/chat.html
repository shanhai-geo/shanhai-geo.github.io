/* ===== 自动记录系统 ===== */
var SESSION_ID = 'shanhai_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);
var conversationLog = [];
var inquiryData = null;

function logMsg(role, content){
  conversationLog.push({t:new Date().toISOString(), role:role, content:content.replace(/<[^>]+>/g,''), session:SESSION_ID});
  saveLocal();
}
function saveLocal(){
  try{
    localStorage.setItem('shanhai_chat_'+SESSION_ID, JSON.stringify(conversationLog));
    if(inquiryData) localStorage.setItem('shanhai_inquiry_'+SESSION_ID, JSON.stringify(inquiryData));
  }catch(e){}
}
function markInquiry(data){
  inquiryData = Object.assign({sessionId:SESSION_ID, timestamp:new Date().toISOString(), userAgent:navigator.userAgent, referrer:document.referrer, path:location.pathname}, data);
  saveLocal();
  try{ navigator.sendBeacon && navigator.sendBeacon('/api/inquiry', JSON.stringify(inquiryData)); }catch(e){}
}
function parseInquiry(text){
  var parts = text.split(/[+＋,，、\s]+/).filter(Boolean);
  var emailMatch = text.match(/[\w.-]+@[\w.-]+\.\w+/);
  if(parts.length >= 2 || emailMatch){
    var data = {raw:text, name:'', company:'', email:''};
    if(emailMatch) data.email = emailMatch[0];
    if(parts.length >= 3){ data.name=parts[0]; data.company=parts[1]; if(!data.email && parts[2].indexOf('@')!==-1) data.email=parts[2]; }
    else if(parts.length === 2){ data.name=parts[0]; data.company=parts[1]; }
    else if(parts.length === 1){ if(parts[0].indexOf('@')!==-1) data.email=parts[0]; else data.name=parts[0]; }
    return data;
  }
  return null;
}

function addOpts(opts){

/* ---- 关键词匹配 ---- */
function handleInput(v){
  var vl=v.toLowerCase();
  if(step==='diag'){
    step='collect';
    markInquiry({stage:'diagnose', brand:v});
    ai('📊 <strong>正在为您分析…</strong><br><br>'+
       '完整诊断报告和推荐方案将通过邮件发送给您。<br><br>'+
       '请留下联系方式 👇<br><br>'+
       '📧 格式：<strong>姓名 + 公司 + 邮箱</strong>');
    return;
  }
  if(step==='collect'){
    step='';
    var parsed = parseInquiry(v);
    if(parsed){
      markInquiry({stage:'collected'});
      addMsg('✅ 收到！我们的顾问会在30分钟内与您联系。<br><br>'+
             '等待期间您可以：<br>'+
             '• 浏览<a href="index.html">首页</a>了解更多<br>'+
             '• 直接<a href="pay.html">开通API</a>即开即用<br><br>'+
             '感谢信任，山海智能期待与您合作！','ai');
    } else {
      markInquiry({stage:'partial', raw:v});
      addMsg('收到您的信息！请补充一下联系方式 👇<br><br>格式：<strong>姓名 + 公司 + 邮箱</strong>','ai');
      step='collect';
    }
    return;
  }
  if(vl.indexOf('价格')!==-1||vl.indexOf('多少钱')!==-1||vl.indexOf('费用')!==-1||vl.indexOf('收费')!==-1||vl.indexOf('套餐')!==-1){priceIntro();return}
  if(vl.indexOf('接入')!==-1||vl.indexOf('技术')!==-1||vl.indexOf('sdk')!==-1||vl.indexOf('文档')!==-1||vl.indexOf('开发')!==-1){apiTechIntro();return}
  if(vl.indexOf('api')!==-1||vl.indexOf('产品')!==-1||vl.indexOf('能力')!==-1||vl.indexOf('功能')!==-1){apiProduct();return}
  if(vl.indexOf('合作')!==-1||vl.indexOf('联盟')!==-1||vl.indexOf('代理')!==-1){apiProduct();return}
  if(vl.indexOf('诊断')!==-1||vl.indexOf('分析')!==-1||vl.indexOf('检测')!==-1||vl.indexOf('方案')!==-1){diagFlow();return}
  if(vl.indexOf('开通')!==-1||vl.indexOf('购买')!==-1||vl.indexOf('付款')!==-1||vl.indexOf('支付')!==-1||vl.indexOf('买')!==-1){goPay();return}
  if(vl.indexOf('企业')!==-1||vl.indexOf('定制')!==-1||vl.indexOf('大客户')!==-1){priceEnterprise();return}
  if(vl.indexOf('旗舰')!==-1){priceFlagship();return}
  if(vl.indexOf('电商')!==-1||vl.indexOf('跨境')!==-1){apiScene('电商');return}
  if(vl.indexOf('教育')!==-1||vl.indexOf('培训')!==-1){apiScene('教育');return}
  if(vl.indexOf('联系')!==-1||vl.indexOf('电话')!==-1||vl.indexOf('人工')!==-1||vl.indexOf('客服')!==-1){collectInfo();return}
  if(vl.indexOf('你好')!==-1||vl.indexOf('hi')!==-1||vl.indexOf('hello')!==-1||vl.indexOf('在吗')!==-1){welcome();return}
  fallback();
}

function send(){
  var v=I.value.trim();if(!v)return;
  addMsg(v,'user');I.value='';
  setTimeout(function(){handleInput(v)},200);
}
I.addEventListener('keypress',function(e){if(e.key==='Enter')send()});
SB.addEventListener('click',send);
setTimeout(welcome,500);
})();
</script>
