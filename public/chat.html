<script>
const SESSION_ID='shanhai_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);
const conversationLog=[];
const chatEl=document.getElementById('chat');
let inquiryData=null;

function logMsg(role,content){
  conversationLog.push({role,content,timestamp:new Date().toISOString()});
  try{localStorage.setItem('shanhai_chat_'+SESSION_ID,JSON.stringify(conversationLog))}catch(e){}
}

function saveLocal(){
  try{localStorage.setItem('shanhai_chat_'+SESSION_ID,JSON.stringify(conversationLog))}catch(e){}
}

function markInquiry(data){
  inquiryData={...data,sessionId:SESSION_ID,timestamp:new Date().toISOString()};
  saveLocal();
}

function parseInquiry(text){
  const patterns={
    name:/我叫([^，。,.\s]{2,5})/,
    company:/(公司|企业|团队|品牌)[^:：]*[:：]\s*([^，。,.\n]{2,20})/,
    email:/[\w.-]+@[\w.-]+\.\w+/,
    phone:/1[3-9]\d{9}/
  };
  const result={};
  for(const[k,r]of Object.entries(patterns)){
    const m=text.match(r);
    if(m)result[k]=m[m.length-1];
  }
  return Object.keys(result).length>0?result:null;
}

function ai(html){
  const div=document.createElement('div');
  div.className='msg ai';
  div.innerHTML=html;
  chatEl.appendChild(div);
  chatEl.scrollTop=chatEl.scrollHeight;
  logMsg('ai',html);
}

function user(text){
  const div=document.createElement('div');
  div.className='msg user';
  div.textContent=text;
  chatEl.appendChild(div);
  chatEl.scrollTop=chatEl.scrollHeight;
  logMsg('user',text);
  const inquiry=parseInquiry(text);
  if(inquiry)markInquiry(inquiry);
  setTimeout(()=>handleInput(text),500);
}

function quickReplies(replies){
  const div=document.createElement('div');
  div.className='quick-replies';
  replies.forEach(r=>{
    const btn=document.createElement('button');
    btn.textContent=r.text;
    btn.onclick=()=>{div.remove();r.fn()};
    div.appendChild(btn);
  });
  chatEl.appendChild(div);
  chatEl.scrollTop=chatEl.scrollHeight;
}

function handleInput(text){
  const t=text.toLowerCase();
  if(t.includes('价格')||t.includes('多少钱')||t.includes('收费')){pricingFlow()}
  else if(t.includes('接入')||t.includes('api')||t.includes('技术')){apiFlow()}

}
