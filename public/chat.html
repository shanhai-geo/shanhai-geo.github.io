/* ===== 自动记录系统 ===== */
const SESSION_ID = 'shanhai_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);
const conversationLog = [];
let inquiryData = null;

function logMsg(role, content){
  conversationLog.push({
    t: new Date().toISOString(),
    role: role,
    content: content.replace(/<[^>]+>/g,''),
    session: SESSION_ID
  });
  saveLocal();
}
function saveLocal(){
  try{
    localStorage.setItem('shanhai_chat_'+SESSION_ID, JSON.stringify(conversationLog));
    // 同步询盘数据
    if(inquiryData){
      localStorage.setItem('shanhai_inquiry_'+SESSION_ID, JSON.stringify(inquiryData));
    }
  }catch(e){}
}
function markInquiry(data){
  inquiryData = Object.assign({
    sessionId: SESSION_ID,
    timestamp: new Date().toISOString(),
    userAgent: navigator.userAgent,
    referrer: document.referrer,
    path: location.pathname
  }, data);
  saveLocal();
  // 尝试发送询盘通知（通过fetch beacon）
  try{
    const payload = JSON.stringify(inquiryData);
    navigator.sendBeacon && navigator.sendBeacon('/api/inquiry', payload);
  }catch(e){}
}
function parseInquiry(text){
  // 解析用户留资信息：姓名 + 公司 + 邮箱
  const parts = text.split(/[+＋,，、\s]+/).filter(Boolean);
  const emailMatch = text.match(/[\w.-]+@[\w.-]+\.\w+/);
  if(parts.length >= 2 || emailMatch){
    const data = { raw: text, name:'', company:'', email:'' };
    if(emailMatch) data.email = emailMatch[0];
    if(parts.length >= 3){
      data.name = parts[0]; data.company = parts[1];
      if(!data.email && parts[2].includes('@')) data.email = parts[2];
    } else if(parts.length === 2){
      data.name = parts[0]; data.company = parts[1];
    } else if(parts.length === 1){
      if(parts[0].includes('@')) data.email = parts[0];
      else data.name = parts[0];
    }
    return data;
  }
  return null;
}

  [{l:'申请加入联盟',fn:collectInfo},{l:'← 返回',fn:welcome}]);

function fallback(){
  ai('感谢您的咨询！我可以为您提供以下帮助 👇',
  [{l:'⚡ API产品介绍',fn:apiProduct},{l:'⚡ API接入',fn:apiIntro},{l:'🤝 合作咨询',fn:bizIntro},{l:'🎯 免费诊断',fn:diagFlow},{l:'💬 联系人工顾问',fn:collectInfo}]);
}

/* ---- input handling ---- */
function handleInput(v){
  const vl=v.toLowerCase();
  if(step==='diag'){
    step='collect';
    markInquiry({ stage:'diagnose', brand: v });
    ai('📊 <strong>诊断报告生成中…</strong><br><br>由于每个品牌的AI搜索表现需要实时抓取分析，完整诊断报告将通过邮件发送给您。<br><br>请留下您的邮箱，我们会在1小时内发送<strong>完整报告 + 优化建议</strong>。<br><br>📧 回复格式：<strong>姓名 + 公司 + 邮箱</strong>');
    return;
  }
  if(step==='collect'){
    step='';
    const parsed = parseInquiry(v);
    if(parsed){
      markInquiry({ stage:'collected', ...parsed });
      addMsg('✅ 收到！我们的专属顾问会在30分钟内与您联系。<br><br>在等待期间，您可以：<br>• 浏览<a href="index.html">首页</a>了解更多<br>• 查看<a href="pay.html">开通页面</a>了解API详情<br><br>感谢您的信任，山海智能期待与您合作！🤝','ai');
    } else {
      markInquiry({ stage:'partial', raw: v });
      addMsg('收到您的信息！为了更精准地为您服务，请补充一下联系方式 👇<br><br>回复格式：<strong>姓名 + 公司 + 邮箱</strong>','ai');
      step='collect';
    }
    return;
  }
  if(vl.includes('价格')||vl.includes('多少钱')||vl.includes('费用')||vl.includes('收费')){priceIntro();return}
  if(vl.includes('api')||vl.includes('接口')||vl.includes('接入')||vl.includes('开发')){apiIntro();return}
  if(vl.includes('api')||vl.includes('产品')||vl.includes('能力')||vl.includes('接口')){apiProduct();return}
  if(vl.includes('合作')||vl.includes('联盟')||vl.includes('代理')){bizIntro();return}
  if(vl.includes('诊断')||vl.includes('分析')||vl.includes('检测')){diagFlow();return}
  if(vl.includes('开通')||vl.includes('购买')||vl.includes('付款')||vl.includes('支付')){goPay();return}
  if(vl.includes('电商')||vl.includes('跨境')||vl.includes('亚马逊')){industry('电商');return}
  if(vl.includes('企业')||vl.includes('定制')||vl.includes('大客户')){priceEnterprise();return}
  if(vl.includes('联系')||vl.includes('电话')||vl.includes('人工')){collectInfo();return}
  if(vl.includes('你好')||vl.includes('hi')||vl.includes('hello')||vl.includes('在吗')){welcome();return}
  fallback();
}
function send(){
  const v=I.value.trim();if(!v)return;
  addMsg(v,'user');I.value='';
  setTimeout(()=>handleInput(v),200);
}
I.addEventListener('keypress',e=>{if(e.key==='Enter')send()});
SB.addEventListener('click',send);
setTimeout(welcome,500);
})();
</script>
