<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
<meta http-equiv="Content-Security-Policy" content="frame-ancestors 'self' https://shanhai-geo.github.io;">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<title>密钥发放确认 - 山海云枢管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#060a12;min-height:100vh;padding:20px;color:#e8edf5}
.card{background:#111827;border:1px solid #1e2d44;border-radius:16px;padding:24px 20px;max-width:400px;width:100%;margin:20px auto}
.title{font-size:18px;font-weight:800;color:#d4a04a;text-align:center;margin-bottom:16px}
.section{margin-bottom:16px}
.section-title{font-size:13px;color:#94a3b8;margin-bottom:8px;font-weight:600}
.order-info{background:#1a2236;border:1px solid #1e2d44;border-radius:10px;padding:16px;font-size:13px;line-height:2}
.order-info .label{color:#94a3b8}
.order-info .val{color:#e8edf5;font-weight:600}
.order-info .highlight{color:#d4a04a;font-family:monospace}
.key-box{background:#0c1220;border:2px dashed #d4a04a;border-radius:10px;padding:16px;text-align:center;margin-top:12px;position:relative}
.key-box .key-label{font-size:11px;color:#94a3b8;margin-bottom:8px}
.key-box .key-value{font-size:16px;font-weight:700;color:#10b981;font-family:monospace;word-break:break-all;letter-spacing:1px}
.key-box .key-masked{font-size:16px;font-weight:700;color:#4b5c73;font-family:monospace;letter-spacing:2px}
.key-box.hidden-key .key-value{display:none}
.key-box.hidden-key .key-masked{display:block}
.key-box.revealed-key .key-value{display:block}
.key-box.revealed-key .key-masked{display:none}
.copy-btn{display:inline-block;margin-top:10px;padding:8px 20px;font-size:12px;font-weight:700;color:#d4a04a;background:transparent;border:1px solid #d4a04a;border-radius:6px;cursor:pointer}
.copy-btn:active{background:rgba(212,160,74,.15)}
.btn{width:100%;padding:14px;font-size:16px;font-weight:700;border:none;border-radius:10px;cursor:pointer;margin-top:12px;transition:all .3s}
.btn-confirm{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.btn-confirm:disabled{opacity:.4;cursor:default}
.btn-confirm.countdown{background:linear-gradient(135deg,#ef4444,#dc2626)}
.btn-confirm:active:not(:disabled){opacity:.85}
.status{text-align:center;padding:10px;border-radius:8px;margin-top:12px;font-size:13px;display:none}
.status.ok{display:block;background:rgba(16,185,129,.1);color:#10b981;border:1px solid rgba(16,185,129,.3)}
.status.err{display:block;background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.status.warn{display:block;background:rgba(234,179,8,.1);color:#eab308;border:1px solid rgba(234,179,8,.3)}
.expired-box{text-align:center;padding:40px 20px}
.expired-box .icon{font-size:48px;margin-bottom:16px}
.expired-box .msg{font-size:16px;color:#ef4444;font-weight:700;margin-bottom:8px}
.expired-box .sub{font-size:13px;color:#94a3b8}
.tip{font-size:10px;color:#4b5c73;text-align:center;margin-top:12px;line-height:1.6}
.forward-hint{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:12px;margin-top:12px;font-size:12px;color:#10b981;text-align:center;line-height:1.8;display:none}
.history-sec{margin-top:20px;border-top:1px solid #1e2d44;padding-top:16px}
.history-item{background:#0c1220;border-radius:8px;padding:10px;margin-bottom:6px;font-size:11px;line-height:1.8;color:#94a3b8}
.history-item .done{color:#10b981}
</style>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
</head>
<body>
<div class="card">
<div class="title">密钥发放确认</div>

<!-- 过期提示 -->
<div id="expiredSection" style="display:none">
<div class="expired-box">
<div class="icon">⏰</div>
<div class="msg">链接已过期</div>
<div class="sub">此确认链接已超过24小时，密钥已自动作废。<br>如需重新发放，请联系运营人员。</div>
</div>
</div>

<!-- 主内容区 -->
<div id="mainSection">
<!-- 订单信息 -->
<div class="section" id="orderSection">
<div class="section-title">订单信息</div>
<div class="order-info" id="orderInfo"></div>
</div>

<!-- 密钥展示区 -->
<div class="key-box hidden-key" id="keyBox">
<div class="key-label">服务密钥</div>
<div class="key-value" id="keyValue"></div>
<div class="key-masked">••••••••••••••••</div>
<button class="copy-btn" id="copyBtn" style="display:none" onclick="copyKey()">复制密钥</button>
</div>

<!-- 确认按钮 -->
<button class="btn btn-confirm" id="confirmBtn" disabled onclick="handleConfirm()">确认到款，发放密钥</button>
<div class="status" id="statusBox"></div>

<!-- 发放成功后的转发提示 -->
<div class="forward-hint" id="forwardHint">
发放成功！请将本页面链接转发给客户，客户打开即可看到密钥。<br>
<button class="copy-btn" onclick="copyPageLink()" style="margin-top:6px">复制页面链接</button>
</div>
</div>

<!-- 历史记录 -->
<div class="history-sec" id="historySec" style="display:none">
<div class="section-title">已发放记录</div>
<div id="historyList"></div>
</div>

<div class="tip" id="tipArea">
确认链接24小时内有效，超时密钥自动作废<br>
首次点击按钮进入倒计时，再次点击确认发放
</div>
</div>

<script>
var orderId='',phone='',timeStr='',apiKey='',createdAt=0;
var countdownTimer=null;
var countdownLeft=0;
var isConfirmed=false;

function parseUrlParams(){
  var p={};
  var q=window.location.search.substring(1);
  if(!q)return p;
  q.split('&').forEach(function(s){
    var kv=s.split('=');
    if(kv.length>=2){
      var key=kv[0];
      var val=kv.slice(1).join('=');
      p[decodeURIComponent(key)]=decodeURIComponent(val);
    }
  });
  return p;
}

function checkExpiry(){
  if(!createdAt)return false;
  var now=Date.now();
  var diff=now-createdAt;
  var hours24=24*60*60*1000;
  return diff>hours24;
}

function formatTimeRemaining(){
  if(!createdAt)return '';
  var now=Date.now();
  var diff=24*60*60*1000-(now-createdAt);
  if(diff<=0)return '已过期';
  var hours=Math.floor(diff/(60*60*1000));
  var mins=Math.floor((diff%(60*60*1000))/(60*1000));
  return '剩余 '+hours+'小时'+mins+'分钟';
}

function init(){
  var p=parseUrlParams();
  orderId=p.oid||'';
  phone=p.phone||'';
  timeStr=p.time||'';
  apiKey=p.key||'';
  createdAt=parseInt(p.created)||0;

  if(!orderId||!phone){
    // 没有URL参数，尝试从localStorage加载
    loadFromLocalStorage();
    return;
  }

  // 检查过期
  if(checkExpiry()){
    document.getElementById('mainSection').style.display='none';
    document.getElementById('expiredSection').style.display='block';
    document.getElementById('tipArea').style.display='none';
    return;
  }

  // 检查是否已确认过
  var orders=JSON.parse(localStorage.getItem('sh_orders')||'[]');
  var existing=null;
  for(var i=0;i<orders.length;i++){
    if(orders[i].oid===orderId){existing=orders[i];break;}
  }
  if(existing&&existing.status==='delivered'){
    showDeliveredState(existing);
    return;
  }

  // 显示订单信息
  document.getElementById('orderInfo').innerHTML=
    '<div><span class="label">订单号：</span><span class="highlight">'+orderId+'</span></div>'+
    '<div><span class="label">客户手机：</span><span class="val">'+phone+'</span></div>'+
    '<div><span class="label">下单时间：</span><span class="val">'+timeStr+'</span></div>'+
    '<div><span class="label">有效期：</span><span class="val" style="color:#eab308">'+formatTimeRemaining()+'</span></div>';

  // 设置密钥（隐藏状态）
  if(apiKey){
    document.getElementById('keyValue').textContent=apiKey;
    document.getElementById('keyBox').className='key-box hidden-key';
  }

  // 启用按钮
  document.getElementById('confirmBtn').disabled=false;

  // 保存到localStorage
  if(!existing){
    orders.push({oid:orderId,phone:phone,time:timeStr,key:apiKey,status:'pending',createdAt:createdAt,confirmTime:0});
    localStorage.setItem('sh_orders',JSON.stringify(orders));
  }

  loadHistory();
}

function loadFromLocalStorage(){
  var orders=JSON.parse(localStorage.getItem('sh_orders')||'[]');
  var pending=orders.filter(function(o){return o.status==='pending'});
  if(pending.length>0){
    var o=pending[pending.length-1];
    orderId=o.oid;phone=o.phone;timeStr=o.time;apiKey=o.key||'';createdAt=o.createdAt||0;
    document.getElementById('orderInfo').innerHTML=
      '<div><span class="label">订单号：</span><span class="highlight">'+o.oid+'</span></div>'+
      '<div><span class="label">客户手机：</span><span class="val">'+o.phone+'</span></div>'+
      '<div><span class="label">下单时间：</span><span class="val">'+o.time+'</span></div>';
    if(o.key){
      document.getElementById('keyValue').textContent=o.key;
      document.getElementById('keyBox').className='key-box hidden-key';
    }
    document.getElementById('confirmBtn').disabled=false;
  }else{
    document.getElementById('orderInfo').innerHTML='<div style="color:#4b5c73;text-align:center;padding:20px">暂无待处理订单</div>';
    document.getElementById('confirmBtn').disabled=true;
  }
  loadHistory();
}

function showDeliveredState(order){
  isConfirmed=true;
  document.getElementById('orderInfo').innerHTML=
    '<div><span class="label">订单号：</span><span class="highlight">'+order.oid+'</span></div>'+
    '<div><span class="label">客户手机：</span><span class="val">'+order.phone+'</span></div>'+
    '<div><span class="label">下单时间：</span><span class="val">'+order.time+'</span></div>'+
    '<div><span class="label">状态：</span><span class="val" style="color:#10b981">已发放</span></div>';
  if(order.key){
    document.getElementById('keyValue').textContent=order.key;
    document.getElementById('keyBox').className='key-box revealed-key';
    document.getElementById('copyBtn').style.display='inline-block';
  }
  document.getElementById('confirmBtn').disabled=true;
  document.getElementById('confirmBtn').textContent='已发放';
  document.getElementById('forwardHint').style.display='block';
  document.getElementById('tipArea').style.display='none';
}

function handleConfirm(){
  if(isConfirmed)return;
  if(!apiKey){
    showStatus('密钥信息缺失，无法发放','err');
    return;
  }

  // 第一次点击：进入倒计时
  if(countdownTimer===null){
    countdownLeft=10;
    var btn=document.getElementById('confirmBtn');
    btn.className='btn btn-confirm countdown';
    btn.textContent='再次点击确认发放 ('+countdownLeft+'秒)';
    showStatus('即将向客户 '+phone+' 发放密钥，如误点请在倒计时内取消','warn');
    countdownTimer=setInterval(function(){
      countdownLeft--;
      if(countdownLeft<=0){
        clearInterval(countdownTimer);
        countdownTimer=null;
        resetButton();
        showStatus('倒计时已结束，请重新点击确认','err');
        setTimeout(function(){document.getElementById('statusBox').style.display='none'},3000);
      }else{
        document.getElementById('confirmBtn').textContent='再次点击确认发放 ('+countdownLeft+'秒)';
      }
    },1000);
    return;
  }

  // 第二次点击：确认发放
  clearInterval(countdownTimer);
  countdownTimer=null;
  doConfirm();
}

function resetButton(){
  var btn=document.getElementById('confirmBtn');
  btn.className='btn btn-confirm';
  btn.textContent='确认到款，发放密钥';
}

function doConfirm(){
  // 更新localStorage
  var orders=JSON.parse(localStorage.getItem('sh_orders')||'[]');
  for(var i=0;i<orders.length;i++){
    if(orders[i].oid===orderId){
      orders[i].status='delivered';
      orders[i].deliveredAt=new Date().toISOString();
      orders[i].confirmTime=Date.now();
      break;
    }
  }
  localStorage.setItem('sh_orders',JSON.stringify(orders));

  isConfirmed=true;

  // 显示密钥
  document.getElementById('keyBox').className='key-box revealed-key';
  document.getElementById('copyBtn').style.display='inline-block';

  // 更新按钮
  var btn=document.getElementById('confirmBtn');
  btn.disabled=true;
  btn.textContent='已发放';

  // 显示成功提示
  showStatus('密钥已发放！请将本页面链接转发给客户','ok');

  // 显示转发提示
  document.getElementById('forwardHint').style.display='block';
  document.getElementById('tipArea').style.display='none';

  // 更新订单信息
  document.getElementById('orderInfo').innerHTML=
    '<div><span class="label">订单号：</span><span class="highlight">'+orderId+'</span></div>'+
    '<div><span class="label">客户手机：</span><span class="val">'+phone+'</span></div>'+
    '<div><span class="label">下单时间：</span><span class="val">'+timeStr+'</span></div>'+
    '<div><span class="label">发放时间：</span><span class="val" style="color:#10b981">'+new Date().toLocaleString()+'</span></div>'+
    '<div><span class="label">状态：</span><span class="val" style="color:#10b981">已发放</span></div>';

  loadHistory();
}

function showStatus(msg,type){
  var el=document.getElementById('statusBox');
  el.className='status '+type;
  el.innerHTML=msg;
}

function copyKey(){
  var text=apiKey||document.getElementById('keyValue').textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){
      document.getElementById('copyBtn').textContent='已复制';
      setTimeout(function(){document.getElementById('copyBtn').textContent='复制密钥'},2000);
    });
  }else{
    var inp=document.createElement('textarea');
    inp.value=text;document.body.appendChild(inp);inp.select();document.execCommand('copy');
    document.body.removeChild(inp);
    document.getElementById('copyBtn').textContent='已复制';
    setTimeout(function(){document.getElementById('copyBtn').textContent='复制密钥'},2000);
  }
}

function copyPageLink(){
  var url=location.href;
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){alert('链接已复制，转发给客户即可')});
  }else{
    var inp=document.createElement('textarea');
    inp.value=url;document.body.appendChild(inp);inp.select();document.execCommand('copy');
    document.body.removeChild(inp);alert('链接已复制，转发给客户即可');
  }
}

function loadHistory(){
  var orders=JSON.parse(localStorage.getItem('sh_orders')||'[]');
  var delivered=orders.filter(function(o){return o.status==='delivered'});
  if(delivered.length>0){
    document.getElementById('historySec').style.display='block';
    var h='';
    delivered.slice(-5).reverse().forEach(function(o){
      h+='<div class="history-item"><span class="done">✓</span> '+o.oid+' | '+o.phone+' | '+(o.deliveredAt?new Date(o.deliveredAt).toLocaleDateString():'')+'</div>';
    });
    document.getElementById('historyList').innerHTML=h;
  }
}

init();
</script>
</body>
</html>
