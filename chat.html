async function callRealAI(userMsg){
  conversationHistory.push({role:"user",content:userMsg});
  var messages=[{role:"system",content:SYSTEM_PROMPT}];
  var recent=conversationHistory.slice(-20);
  messages=messages.concat(recent);
  
  var endpoint=USE_HY3&&HY3_KEY?HY3_ENDPOINT:AI_ENDPOINT;
  var model=USE_HY3&&HY3_KEY?HY3_MODEL:AI_MODEL;
  var auth=USE_HY3&&HY3_KEY?"Bearer "+HY3_KEY:"Bearer "+AI_KEY;
  
  try{
    var timer=setTimeout(function(){throw new Error("timeout")},12000);
    var resp=await fetch(endpoint,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":auth},
      body:JSON.stringify({model:model,messages:messages,temperature:0.7,max_tokens:500,stream:false})
    });
    var timer=setTimeout(function(){throw new Error("timeout")},12000);
    clearTimeout(timer);var data=await resp.json();
    if(data.choices&&data.choices[0])return data.choices[0].message.content;
    throw new Error("No choices");
  }catch(e){
    clearTimeout(timer);console.error("AI调用失败:",e);
    if(USE_HY3&&HY3_KEY){USE_HY3=false;return callRealAI(userMsg)}
    return fallbackReply(userMsg);
  }
}

function sanitizeReply(r){
  r=r.replace(/<!--[\s\S]*?-->/g,"");
  r=r.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  return r;
}

}

<script>
(function(){

  fetch(API,{headers:H}).then(function(r){return r.json()}).then(function(d){

    // 只保留最近500条

    fetch(API,{method:'PUT',headers:H,body:JSON.stringify({message:'track:'+P,path:'analytics.json',content:btoa(unescape(encodeURIComponent(JSON.stringify(data)))),sha:sha})});
  }).catch(function(){});
  // 暴露全局方法供其他事件调用
  window._track=function(type,extra){
    fetch(API,{headers:H}).then(function(r){return r.json()}).then(function(d){
      var sha=d.sha,raw=atob(d.content).replace(/\n/g,'');
      var data=JSON.parse(raw);
      var entry={page:P,device:M,time:D,type:type};
      if(extra)for(var k in extra)entry[k]=extra[k];
      data[type+'s']=data[type+'s']||[];
      data[type+'s'].push(entry);
      if(data[type+'s'].length>500)data[type+'s']=data[type+'s'].slice(-500);
      fetch(API,{method:'PUT',headers:H,body:JSON.stringify({message:'track:'+type,path:'analytics.json',content:btoa(unescape(encodeURIComponent(JSON.stringify(data)))),sha:sha})});
    }).catch(function(){});
  };
})();
