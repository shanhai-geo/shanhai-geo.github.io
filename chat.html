<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>山海智能AI客服 - 7×24在线服务</title>
<meta name="description" content="唤通·AI统调——一个接口调用一切AI能力。7引擎智能路由，包年不限量，¥298/年起。">

<style>
:root{
  --gold:#ffd700;--gold-dim:rgba(255,215,0,.15);--gold-glow:rgba(255,215,0,.35);
  --bg-deep:#06060e;--bg-card:#0d0d1a;--bg-glass:rgba(18,18,36,.72);
  --text:#e8e8f0;--text-dim:#8a8aa0;--border:rgba(255,255,255,.06);
  --ai-bg:rgba(22,22,44,.85);--user-bg:linear-gradient(135deg,#1a3a6e,#1e40af);
  --radius:18px;--radius-sm:12px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:var(--bg-deep);color:var(--text);height:100%;overflow:hidden;
  display:flex;flex-direction:column;
}
.bg-orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-orbs .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18;animation:orbFloat 20s ease-in-out infinite}
.bg-orbs .orb:nth-child(1){width:420px;height:420px;background:#ffd700;top:-10%;left:-8%;animation-duration:22s}
.bg-orbs .orb:nth-child(2){width:340px;height:340px;background:#3b82f6;bottom:-12%;right:-6%;animation-duration:18s;animation-delay:-5s}
.bg-orbs .orb:nth-child(3){width:260px;height:260px;background:#a855f7;top:40%;left:55%;animation-duration:25s;animation-delay:-10s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-40px) scale(1.05)}66%{transform:translate(-20px,30px) scale(.95)}}
.chat-header{
  position:relative;z-index:2;
  background:var(--bg-glass);backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);
  padding:14px 20px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,215,0,.12);
}
.chat-header .logo{
  width:42px;height:42px;border-radius:14px;
  background:linear-gradient(135deg,#ffd700 0%,#ff8c00 100%);
  display:flex;align-items:center;justify-content:center;font-size:22px;
  box-shadow:0 0 20px rgba(255,215,0,.25);flex-shrink:0;
}
.chat-header .info{flex:1}
.chat-header .info h1{font-size:16px;font-weight:700;color:var(--gold);letter-spacing:.3px}
.chat-header .info .sub{font-size:11px;color:var(--text-dim);margin-top:2px}
.online-badge{
  display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#4ade80;
  background:rgba(74,222,128,.08);padding:3px 10px;border-radius:20px;margin-top:3px;
}
.online-badge::before{content:"";width:6px;height:6px;background:#4ade80;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.chat-body{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative;z-index:1}
.messages{flex:1;overflow-y:auto;padding:16px 0;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:rgba(255,215,0,.2);border-radius:4px}
.msg-row{display:flex;gap:10px;margin-bottom:14px;padding:0 16px;max-width:680px;margin-left:auto;margin-right:auto;width:100%;animation:msgIn .4s cubic-bezier(.16,1,.3,1) both}
.msg-row.user{flex-direction:row-reverse}
@keyframes msgIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px}
.msg-row.ai .avatar{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;box-shadow:0 0 12px rgba(255,215,0,.2)}
.msg-row.user .avatar{background:var(--user-bg);color:#fff}
.bubble{max-width:82%;padding:12px 16px;line-height:1.7;font-size:14px;position:relative;word-break:break-word}
.msg-row.ai .bubble{background:var(--ai-bg);border:1px solid var(--border);border-radius:4px var(--radius) var(--radius) var(--radius);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.msg-row.user .bubble{background:var(--user-bg);border-radius:var(--radius) 4px var(--radius) var(--radius);color:#fff}
.bubble a{color:var(--gold);text-decoration:underline;text-underline-offset:2px}
.bubble b,.bubble strong{color:var(--gold);font-weight:600}
.quick-opts{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0 8px 56px;max-width:680px;margin:0 auto;width:100%;animation:msgIn .4s cubic-bezier(.16,1,.3,1) both;animation-delay:.1s}
.q-btn{background:var(--gold-dim);border:1px solid rgba(255,215,0,.25);color:var(--gold);padding:8px 18px;border-radius:24px;cursor:pointer;font-size:13px;font-weight:500;transition:all .25s;white-space:nowrap}
.q-btn:hover,.q-btn:active{background:rgba(255,215,0,.22);border-color:rgba(255,215,0,.5);transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,215,0,.15)}
.typing-row{display:flex;gap:10px;padding:0 16px;margin-bottom:14px;max-width:680px;margin-left:auto;margin-right:auto;width:100%}
.typing-dots{background:var(--ai-bg);border:1px solid var(--border);border-radius:4px var(--radius) var(--radius) var(--radius);padding:14px 20px;display:flex;gap:5px;align-items:center;backdrop-filter:blur(8px)}
.typing-dots span{width:7px;height:7px;background:var(--gold);border-radius:50%;animation:dotBounce .6s ease-in-out infinite alternate}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes dotBounce{to{transform:translateY(-6px);opacity:.4}}
.input-area{padding:10px 16px 14px;background:var(--bg-glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;max-width:680px;margin:0 auto;width:100%}
.input-area input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:12px 18px;border-radius:28px;font-size:14px;outline:none;transition:border-color .2s}
.input-area input:focus{border-color:var(--gold-glow);box-shadow:0 0 0 3px rgba(255,215,0,.08)}
.input-area input::placeholder{color:rgba(255,255,255,.25)}
.send-btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;flex-shrink:0}
.send-btn:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(255,215,0,.3)}
.send-btn:active{transform:scale(.95)}
.chat-footer{text-align:center;padding:6px;font-size:10px;color:rgba(255,255,255,.2);background:var(--bg-deep);position:relative;z-index:1}
@media(min-width:768px){
  body{align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 20%,rgba(255,215,0,.04),transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(59,130,246,.04),transparent 60%),var(--bg-deep)}
  .chat-card{width:460px;height:90vh;max-height:780px;border-radius:24px;overflow:hidden;display:flex;flex-direction:column;border:1px solid rgba(255,215,0,.1);box-shadow:0 0 60px rgba(255,215,0,.06),0 24px 80px rgba(0,0,0,.5);background:var(--bg-card);position:relative}
  .chat-card .bg-orbs{border-radius:24px}
  .chat-footer{display:none}
}
@media(max-width:767px){.chat-card{display:contents}}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<div class="chat-card">
<header class="chat-header">

<div class="chat-body">

    <label for="userInput" class="sr-only">输入消息</label>

<script>
(function(){
"use strict";
var M=document.getElementById('messages'),I=document.getElementById('userInput'),SB=document.getElementById('sendBtn');

/* ===== 会话追踪 ===== */
var SESSION_ID='shanhai_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);
var conversationLog=[], userContext={industry:'', tech:'', intent:'', name:'', email:'', stage:'start'};

function logMsg(role,content){
  conversationLog.push({t:new Date().toISOString(),role:role,content:content.replace(/<[^>]+>/g,''),session:SESSION_ID,ctx:Object.assign({},userContext)});
  try{localStorage.setItem('shanhai_chat_'+SESSION_ID,JSON.stringify(conversationLog))}catch(e){}
}

/* ===== 自然语言工具 ===== */
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function scroll(){requestAnimationFrame(function(){M.scrollTop=M.scrollHeight})}
function addMsg(html,who){
  var r=document.createElement('div');r.className='msg-row '+who;
  r.innerHTML='<div class="avatar">'+(who==='ai'?'🏔':'👤')+'</div><div class="bubble">'+html+'</div>';
  M.appendChild(r);scroll();logMsg(who,html);return r;
}
function addOpts(opts){
  if(!opts||!opts.length)return;
  var w=document.createElement('div');w.className='quick-opts';
  opts.forEach(function(o){
    var b=document.createElement('button');b.className='q-btn';b.textContent=o.l;
    b.onclick=function(){w.remove();addMsg(o.l,'user');logMsg('action',o.l);setTimeout(function(){o.fn()},500+Math.random()*600)};
    w.appendChild(b);
  });
  M.appendChild(w);scroll();
}
function showTyping(){
  var r=document.createElement('div');r.className='typing-row';r.id='typ';
  r.innerHTML='<div class="avatar" style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;flex-shrink:0">🏔</div><div class="typing-dots"><span></span><span></span><span></span></div>';
  M.appendChild(r);scroll();
}
function hideTyping(){var t=document.getElementById('typ');if(t)t.remove()}
function ai(html,opts,delay){
  showTyping();
  setTimeout(function(){hideTyping();addMsg(html,'ai');if(opts)addOpts(opts)},delay||800+Math.random()*800);
}

/* ===== 关键词理解引擎 ===== */
function understand(text){
  var t=text.toLowerCase();
  if(/价格|多少钱|费用|贵|便宜|收费|怎么卖|报价/.test(t)) return 'price';
  if(/api|接口|sdk|接入|调用|技术|开发|代码|文档|token|密钥|key/.test(t)) return 'tech';
  if(/买|购买|开通|下单|付款|支付|怎么买|怎么付/.test(t)) return 'buy';
  if(/退款|退钱|不想要|取消/.test(t)) return 'refund';
  if(/客服|人工|转接|真人|顾问|联系/.test(t)) return 'human';
  if(/做什么|干什么|你们|公司|介绍|产品|服务|功能|是什么/.test(t)) return 'intro';
  if(/电商|淘宝|京东|跨境|shopify/.test(t)) return 'scene_ecom';
  if(/教育|培训|学校|课程|老师/.test(t)) return 'scene_edu';
  if(/餐饮|酒店|旅游|本地|生活|美容|美发/.test(t)) return 'scene_local';
  if(/saas|软件|科技|互联网|小程序|app/.test(t)) return 'scene_tech';
  if(/你好|在吗|hi|hello|嗨|哈喽/.test(t)) return 'greet';
  if(/谢谢|感谢|辛苦|棒|厉害|不错/.test(t)) return 'thanks';
  if(/犹豫|考虑|想想|再看看|不急/.test(t)) return 'hesitate';
  if(/安全|稳定|速度|延迟|并发|sla|保障/.test(t)) return 'quality';
  if(/优惠|折扣|活动|促销|便宜点/.test(t)) return 'discount';
  return 'other';
}

/* ===== 人性化对话核心 ===== */

/* 开场白 - 每次不同 */
var greetings=[
  '嗨，欢迎来到<strong>唤通·AI统调</strong>！一个接口搞定所有AI能力。想聊点什么？',
  '你好！我是唤通的AI顾问，有啥问题尽管问～',
  '来了～想了解一下AI统调服务，还是随便聊聊？',
  'Hi！想接入AI能力？还是先看看？'
];

/* 产品介绍 - 不说教，像朋友推荐 */
function introProduct(){
  var lines=[
    '简单说，我们做的是<strong>唤通</strong>——统一的AI能力调用入口。<br><br>一句话：<strong>让AI调用一切</strong>。',
    '',
    '你不需要分别对接多个大模型，一个API搞定所有。<br><br>我们在背后跑了7个引擎：<strong>阿里百炼、火山引擎、智谱GLM、百度千帆、百川智能、讯飞星火、阿里百炼Flash</strong>，自动切换最快通道。',
    '',
    '智能客服、内容生成、数据分析……<strong>一个接口，7引擎路由，自动选最快的</strong>。'
  ];
  return lines.join('<br>');
}

function introWithScene(){
  var lines=[
    '给你说几个真实场景你就明白了：',
    '',
    '🛒 <strong>电商</strong>：接了API之后，客服自动回，转化率涨了30%',
    '🏨 <strong>本地服务</strong>：相当于请了个24小时不休息的前台',
    '💻 <strong>SaaS产品</strong>：3行代码接入，立刻有AI卖点',
    '📚 <strong>教育</strong>：每个学生都有专属AI答疑',
    '',
    '你们是做什么行业的？我帮你看看怎么用最合适。'
  ];
  return lines.join('<br>');
}

/* 价格相关 - 轻描淡写，不推销 */
function priceTalk(){
  var lines=[
    '说实话，我们的模式跟别人完全不一样。',
    '',
    '基础版 <strong>¥298/年</strong>，298÷365=<strong>0.82元/天</strong>，比一瓶矿泉水都便宜。',
    '<strong>包年不限量调用</strong>。市面上按token计费的，贵我们3-5倍。',

    '',
    '大部分客户都是从基础版开始的，够用了再升级。'

/* 犹豫时 - 不催，给信心 */
function handleHesitate(){
  var r=pick([
    '理解的，选产品确实要多比较。',
    '没关系，不着急。你可以先看看文档，有任何问题随时来问。',

  r+='<br><br>对了，很多客户跟你的情况差不多，最后发现<strong>试了才知道好不好用</strong>。基础版不到1块/天，试错成本很低的。';
  return r;

/* 要人工 - 不拦，但先帮一下 */
function handleHuman(){
  return '没问题，我可以帮你转接人工顾问。<br><br>不过在等的时候，要不要先跟我说说你的需求？我可以先帮你做个初步分析，这样顾问接到的时候能直接给你方案，省得重复沟通。';
}

/* 自由对话应答 */
function freeChat(text){
  var intent=understand(text);
  switch(intent){
    case 'greet': return pick(['你好呀！有什么想了解的？','嗨！随时可以问我。','在的，说吧～']);
    case 'thanks': return pick(['不客气！有任何问题随时找我。','应该的～祝你顺利！','没关系，能帮到你就好。']);
    case 'price': return priceTalk();
    case 'tech': return '技术上你放心，我们完全兼容OpenAI的格式。如果你现在用的就是OpenAI，改两行代码就能切过来。<br><br>响应速度P99在500ms以内，99.9%的SLA保障。<br><br>你现在用的是什么技术栈？Python、Node还是Java？';
    case 'buy': return '直接开通很简单 👇<br><br>基础版 ¥298/年，点击下方就能跳转支付。<br>付款后填一下联系信息，API Key 10分钟内发到你邮箱。';
    case 'refund': return '7天无理由退款，没有任何套路。<br><br>如果用了觉得不合适，直接联系客服退款就行，不会问原因。';
    case 'human': return handleHuman();
    case 'intro': return introProduct();
    case 'scene_ecom': userContext.industry='电商'; return '电商确实是最快见效的行业！<br><br>智能客服7×24自动回复、商品文案批量生成、客户意图分析……<br><br>很多电商客户第一周就回本了。你做的是哪个品类？';
    case 'scene_edu': userContext.industry='教育'; return '教育行业用AI效率真的翻倍。<br><br>智能答疑、自动出题、个性化学习推荐……一个API全搞定。<br><br>你们是做K12还是职业教育？';
    case 'scene_local': userContext.industry='本地生活'; return '本地生活服务业太需要AI了！<br><br>自动接听客户咨询、预约管理、口碑回复……相当于24小时不休息的金前台。<br><br>你们是做餐饮还是美业？';
    case 'scene_tech': userContext.industry='科技'; return 'SaaS产品集成AI是大趋势。<br><br>3行代码接入，兼容OpenAI SDK，你们的技术团队分分钟搞定。<br><br>你们产品主要解决什么问题？我帮你看看API怎么接最合适。';
    case 'quality': return '这块你可以放心：<br><br>• 99.9% SLA可用性保障<br>• 独立租户隔离，数据不交叉<br>• TLS 1.3加密传输<br>• 全球多节点部署<br><br>生产级稳定性，不是demo。';
    case 'discount': return '目前 ¥298/年 已经是很实在的价格了，平均不到1块钱一天。<br><br>如果你一次性开通专业版或企业版，性价比更高。';
    default:
      if(text.length<5) return pick(['嗯？可以再说详细点吗？','你说的是？我想了解一下。','嗯嗯，然后呢？']);
      return '你说的我理解了。能再具体说说你的情况吗？比如你们是做什么行业的、想解决什么问题？<br><br>这样我能给你更有针对性的建议。';
  }
}

/* ===== 主对话流程 ===== */

function welcome(){
  ai(pick(greetings),[
    {l:'💡 了解一下你们的产品', fn:function(){userContext.intent='intro';showIntro()}},
    {l:'💰 多少钱？', fn:function(){userContext.intent='price';showPrice()}},
    {l:'🔧 我想接入API', fn:function(){userContext.intent='tech';showTech()}},
    {l:'🎯 帮我分析一下需求', fn:function(){userContext.intent='diag';showDiag()}}
  ]);
}

function showIntro(){
  ai(introProduct()+'<br><br>'+introWithScene(),[
    {l:'🛒 我做电商', fn:function(){userContext.industry='电商';sceneEcom()}},
    {l:'🏨 本地生活/服务业', fn:function(){userContext.industry='服务业';sceneLocal()}},
    {l:'💻 SaaS/科技', fn:function(){userContext.industry='科技';sceneTech()}},
    {l:'📚 教育行业', fn:function(){userContext.industry='教育';sceneEdu()}},
    {l:'🤔 其他行业', fn:function(){userContext.industry='其他';sceneOther()}}
  ]);
}

function sceneEcom(){
  ai(pick([
    '电商太好了！这是API见效最快的行业。',
    '电商客户是我们最多的群体！',
    '电商用AI是真的香～'
  ])+'<br><br>'+
  '给你说几个典型用法：<br><br>'+

/* ===== 输入处理 ===== */
function handleInput(text){
  if(!text.trim())return;
  text=text.trim();

  /* 收集信息阶段 */

    var parts=text.split(/[+＋,，、\s]+/).filter(Boolean);
    var emailMatch=text.match(/[\w.-]+@[\w.-]+\.\w+/);
    userContext.name=parts[0]||'';
    userContext.company=parts[1]||'';
    if(emailMatch)userContext.email=emailMatch[0];
    userContext.stage='collected';
    ai('收到了！我们的顾问会在30分钟内联系你。<br><br>'+
      '在等的时候，要不要先看看我们的API方案？基础版只要¥298/年，可以直接开通体验。',

    return;
  }

  /* 关键词理解+自由对话 */
  var intent=understand(text);
  var response=freeChat(text);

  switch(intent){
    case 'greet': opts=[{l:'了解产品',fn:showIntro},{l:'看价格',fn:showPrice},{l:'帮我分析需求',fn:showDiag}]; break;

    case 'intro': opts=[{l:'🛒 电商',fn:function(){userContext.industry='电商';sceneEcom()}},{l:'🏨 服务业',fn:function(){userContext.industry='服务业';sceneLocal()}},{l:'💻 科技',fn:function(){userContext.industry='科技';sceneTech()}},{l:'💰 先看价格',fn:showPrice}]; break;
    case 'hesitate': opts=[{l:'⚡ 试试 ¥298',fn:goPay},{l:'💬 联系顾问',fn:collectInfo},{l:'👌 先看看',fn:byeSoft}]; break;

}
