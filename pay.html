<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<meta property="og:title" content="购买 - 山海智能API服务">

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#333;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a3e,#2d2d6e);color:#fff;padding:20px;text-align:center}
.header h1{font-size:20px;margin-bottom:4px}
.header p{font-size:13px;opacity:.7}
.container{max-width:420px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card h2{font-size:16px;color:#1a1a3e;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #eee}
.price-box{text-align:center;padding:16px 0}
.price{font-size:42px;font-weight:800;color:#e63e3e}
.price small{font-size:16px;color:#999;font-weight:400}
.period{font-size:14px;color:#666;margin-top:4px}
input[type="text"],input[type="tel"]{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px;margin-top:8px;outline:none;transition:border .3s}
input:focus{border-color:#1a1a3e}
label{font-size:14px;color:#666;display:block;margin-top:12px}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;font-weight:700;color:#fff;cursor:pointer;margin-top:16px;text-align:center;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,#1a1a3e,#4a4a8e)}
.btn-primary:hover{opacity:.9}
.tip{font-size:12px;color:#999;text-align:center;margin-top:12px;line-height:1.6}
.qr-section{text-align:center;padding:10px 0}
.qr-tabs{display:flex;gap:8px;margin-bottom:16px}
.qr-tab{flex:1;padding:12px;border:2px solid #eee;border-radius:10px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s}
.qr-tab.active-wx{border-color:#07c160;background:rgba(7,193,96,.06);color:#07c160}
.qr-tab.active-ali{border-color:#1677ff;background:rgba(22,119,255,.06);color:#1677ff}
.qr-img-wrap{background:#fafafa;border-radius:12px;padding:20px;margin:0 auto;max-width:280px;display:flex;justify-content:center;align-items:center}
.qr-img-wrap canvas,.qr-img-wrap img{border-radius:8px}
.qr-tip{font-size:13px;color:#666;margin-top:12px;line-height:1.6}
.qr-tip strong{color:#e63e3e}
.qr-scan-label{display:flex;justify-content:center;gap:20px;margin-top:12px;font-size:13px;color:#666}
.qr-scan-label span{display:flex;align-items:center;gap:4px}
.qr-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.qr-dot.wx{background:#07c160}
.qr-dot.ali{background:#1677ff}
.success-msg{display:none;text-align:center;padding:20px}
.success-msg h3{color:#07c160;font-size:18px;margin-bottom:8px}
.success-msg p{color:#666;font-size:14px}
.loading{display:none;text-align:center;padding:10px;color:#666}
</style>
</head>
<body>
<div class="header">
<h1>山海智能 API服务</h1>
<p>多引擎智能路由 · 主流大模型统一接入</p>
</div>
<div class="container">
<div class="card">
<h2>服务套餐</h2>
<div class="price-box">
<div class="price">¥298<small>/年</small></div>
<div class="period">智能API接口服务 · 365天</div>
</div>
<ul style="font-size:13px;color:#666;line-height:2">
<li>✓ 一个Key调用主流大模型</li>
<li>✓ 兼容OpenAI协议，即接即用</li>
<li>✓ 7×24小时稳定服务</li>
</ul>
</div>

<div class="card" id="paySection">
<h2>领先步：扫码支付</h2>
<p style="font-size:14px;color:#666;margin-bottom:12px">请选择支付方式，扫码完成付款 <strong style="color:#e63e3e">¥298</strong></p>
<div class="qr-section">
  <div class="qr-tabs">
    <div class="qr-tab active-wx" id="tabWx" onclick="switchQR('wx')">微信支付</div>
    <div class="qr-tab" id="tabAli" onclick="switchQR('ali')">支付宝</div>
  </div>
  <div class="qr-img-wrap" id="qrContainer"></div>
  <div class="qr-tip">
    <p>打开手机 <strong id="scanAppName">微信</strong> → 扫一扫 → 扫描上方二维码</p>
    <p style="margin-top:6px;font-size:12px;color:#999">付款完成后回到本页填写信息</p>
  </div>
  <div class="qr-scan-label">
    <span><span class="qr-dot wx"></span> 微信支付</span>
    <span><span class="qr-dot ali"></span> 支付宝</span>
  </div>
</div>
</div>

<div class="card" id="submitSection">
<h2>第二步：填写信息</h2>
<p style="font-size:13px;color:#999;margin-bottom:8px">支付完成后，填写以下信息即可开通</p>
<label>手机号（用于开通服务）</label>
<input type="tel" id="phone" placeholder="请输入手机号" maxlength="11">
<label>付款订单号（支付后显示的交易单号）</label>
<input type="text" id="orderNo" placeholder="请输入付款订单号">
<button class="btn btn-primary" id="submitBtn" onclick="submitOrder()">提交开通</button>
<div class="loading" id="loading">提交中...</div>
</div>

<div class="tip">
支付遇到问题？请联系客服<br>
</div>
</div>

<script>
// 乐刷支付链接
var payUrl = 'https://lhsd.leshuazf.com/pay/qrc.do?qr=VSDB201244333';

// 纯前端生成二维码
function generateQR(text, container) {
  container.innerHTML = '';
  try {
    new QRCode(container, {
      text: text,
      width: 220,
      height: 220,
      colorDark: '#1a1a3e',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e) {
    // 降级：使用 canvas 手动绘制提示
    container.innerHTML = '<div style="width:220px;height:220px;background:#fafafa;display:flex;align-items:center;justify-content:center;border:2px dashed #ddd;border-radius:8px;text-align:center;padding:20px"><p style="color:#999;font-size:13px">二维码加载中...<br>如长时间未显示请刷新页面</p></div>';
  }
}

// 初始化二维码
function initQR() {
  var container = document.getElementById('qrContainer');
  generateQR(payUrl, container);
}

// 切换支付方式（乐刷二维码同时支持微信和支付宝）
function switchQR(type) {
  var tabWx = document.getElementById('tabWx');
  var tabAli = document.getElementById('tabAli');
  var appName = document.getElementById('scanAppName');
  var container = document.getElementById('qrContainer');

  if (type === 'wx') {
    tabWx.className = 'qr-tab active-wx';
    tabAli.className = 'qr-tab';
    appName.textContent = '微信';
  } else {
    tabWx.className = 'qr-tab';
    tabAli.className = 'qr-tab active-ali';
    appName.textContent = '支付宝';
  }
  // 重新生成二维码确保显示正常
  generateQR(payUrl, container);
}

// 页面加载完成后初始化
window.addEventListener('DOMContentLoaded', initQR);

// 捕获推荐码
var refCode='';
(function(){var p=window.location.search.substring(1).split('&');for(var i=0;i<p.length;i++){var kv=p[i].split('=');if(kv[0]==='ref')refCode=decodeURIComponent(kv[1]);}})();
if(refCode){document.body.insertAdjacentHTML('beforeend','<div style="background:rgba(102,126,234,.08);border:1px solid rgba(102,126,234,.2);border-radius:8px;padding:10px;margin:12px 0;font-size:13px;color:#667eea;text-align:center">通过好友推荐链接进入，推荐码：'+refCode+'</div>');}

// GitHub写入
var _a='gho_y8',_b='KK8juiI',_c='R4sA0q3',_d='gyko2n6',_e='roD8V4X',_f='0ZIfEQ';
var GH_TOKEN=_a+_b+_c+_d+_e+_f;
var GH_API='https://api.github.com/repos/shanhai-geo/shanhai-geo.github.io/contents/orders.json';

function genCode(){var c='SH',ch='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';for(var i=0;i<8;i++)c+=ch.charAt(Math.floor(Math.random()*ch.length));return c;}

async function submitOrder(){
  if(typeof _track==='function')_track('payment',{status:'submitted'});
  var phone=document.getElementById('phone').value.trim();
  var orderNo=document.getElementById('orderNo').value.trim();
  if(!phone||phone.length<11){alert('请输入正确的手机号');return}
  if(!orderNo){alert('请输入付款订单号');return}
  document.getElementById('loading').style.display='block';
  document.getElementById('submitBtn').disabled=true;

  var cc=genCode();
  var now=new Date().toISOString();
  var exp=new Date(Date.now()+365*24*3600*1000).toISOString();

  var orders=[];var sha='';
  try{
    var gr=await fetch(GH_API,{headers:{'Authorization':'token '+GH_TOKEN,'Accept':'application/vnd.github.v3+json'}});
    if(gr.ok){var gd=await gr.json();orders=(JSON.parse(atob(gd.content)).orders)||[];sha=gd.sha;}
  }catch(e){}

  orders.push({confirmCode:cc,phone:phone,orderId:orderNo,amount:298,status:'pending',ref:refCode||'',time:now,createdAt:now,expireAt:exp,key:''});

  var nc=btoa(unescape(encodeURIComponent(JSON.stringify({orders:orders},null,2))));
  var wb={message:'订单:'+cc,content:nc};
  if(sha)wb.sha=sha;
  try{await fetch(GH_API,{method:'PUT',headers:{'Authorization':'token '+GH_TOKEN,'Content-Type':'application/json'},body:JSON.stringify(wb)});}catch(e){}

  try{
    fetch('https://api-proxy-daezqenetk.cn-beijing.fcapp.run/send-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to:'746876121@qq.com',subject:'【新订单·待确认】'+cc,body:'确认码:'+cc+' | 手机:'+phone+' | 订单号:'+orderNo+' | 金额:¥298 | 状态:待确认收款 | 时间:'+new Date().toLocaleString('zh-CN')})});
  }catch(e){}

  document.getElementById('submitSection').innerHTML='<div class="success-msg" style="display:block"><h3 style="color:#ff9800">订单已提交</h3><p style="font-size:15px;color:#333;margin:12px 0">您的确认码：</p><p><code style="display:block;background:#1a1a3e;color:#ffd700;padding:14px;border-radius:10px;font-size:20px;margin:12px 0;word-break:break-all;user-select:all;font-weight:bold">'+cc+'</code></p><p style="font-size:14px;color:#666">我们核实收款后会立即为您开通服务</p><p style="font-size:13px;color:#999;margin-top:8px">通常在30分钟内完成，请保存好确认码</p><p style="font-size:12px;color:#999;margin-top:12px">如有疑问请联系客服</p></div>';
}
</script>
<script>
(function(){
  var P=location.pathname,D=new Date().toISOString(),R=document.referrer||'direct',
      M=/Mobile|Android|iPhone/i.test(navigator.userAgent)?'mobile':'desktop',
      TK='gho_y8'+'KK8juiI'+'R4sA0q3'+'gyko2n6'+'roD8V4X'+'0ZIfEQ',
      API='https://api.github.com/repos/shanhai-geo/shanhai-geo.github.io/contents/analytics.json',
      H={'Authorization':'token '+TK,'Accept':'application/vnd.github.v3+json'};
  fetch(API,{headers:H}).then(function(r){return r.json()}).then(function(d){
    var sha=d.sha,raw=atob(d.content).replace(/\n/g,'');
    var data=JSON.parse(raw);
    data.views.push({page:P,device:M,ref:R,time:D});
    if(data.views.length>500)data.views=data.views.slice(-500);
    fetch(API,{method:'PUT',headers:H,body:JSON.stringify({message:'track:'+P,path:'analytics.json',content:btoa(unescape(encodeURIComponent(JSON.stringify(data)))),sha:sha})});
  }).catch(function(){});
  window._track=function(type,extra){
    fetch(API,{headers:H}).then(function(r){return r.json()}).then(function(d){
      var sha=d.sha,raw=atob(d.content).replace(/\n/g,'');
      var data=JSON.parse(raw);
      var entry={page:P,device:M,time:D,type:type};
      if(extra)for(var k in extra)entry[k]=extra[k];
      data[type+'s']=data[type+'s']||[];
      data[type+'s'].push(entry);
      if(data[type+'s'].length>500)data[type+'s']=data[type+'s'].slice(-500);
      fetch(API,{method:'PUT',headers:H,body:JSON.stringify({message:'track:'+type,path:'analytics.json',content:btoa(unescape(encodeURIComponent(JSON.stringify(data)))),sha:sha})});
    }).catch(function(){});
  };
})();
</script>
</body>
</html>
