<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>购买 - 唤通API服务</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#333;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a3e,#2d2d6e);color:#fff;padding:20px;text-align:center}
.header h1{font-size:20px;margin-bottom:4px}
.header p{font-size:13px;opacity:.7}
.container{max-width:420px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card h2{font-size:16px;color:#1a1a3e;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #eee}
.price-box{text-align:center;padding:16px 0}
.price{font-size:42px;font-weight:800;color:#e63e3e}
.price small{font-size:16px;color:#999;font-weight:400}
.period{font-size:14px;color:#666;margin-top:4px}
.pay-steps{counter-reset:step}
.pay-steps li{list-style:none;counter-increment:step;padding:10px 0 10px 36px;position:relative;font-size:14px;line-height:1.6;border-bottom:1px solid #f5f5f5}
.pay-steps li::before{content:counter(step);position:absolute;left:0;top:10px;width:24px;height:24px;background:#1a1a3e;color:#fff;border-radius:50%;text-align:center;line-height:24px;font-size:12px;font-weight:700}
.pay-steps li:last-child{border-bottom:none}
.amount{font-size:15px;color:#e63e3e;font-weight:700}
input[type="text"],input[type="tel"]{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px;margin-top:8px;outline:none;transition:border .3s}
input:focus{border-color:#1a1a3e}
label{font-size:14px;color:#666;display:block;margin-top:12px}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;font-weight:700;color:#fff;cursor:pointer;margin-top:16px;text-align:center;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,#1a1a3e,#4a4a8e)}
.btn-primary:hover{opacity:.9}
.btn-wechat{background:#07c160}
.btn-alipay{background:#1677ff}
.tip{font-size:12px;color:#999;text-align:center;margin-top:12px;line-height:1.6}
.guarantee{background:#f0f9ff;border-radius:8px;padding:12px;text-align:center;font-size:13px;color:#0066cc;margin-top:12px}
.success-msg{display:none;text-align:center;padding:20px}
.success-msg h3{color:#07c160;font-size:18px;margin-bottom:8px}
.success-msg p{color:#666;font-size:14px}
.loading{display:none;text-align:center;padding:10px;color:#666}
</style>
</head>
<body>
<div class="header">
<h1>唤通 API服务</h1>
<p>一个接口调用一切AI能力</p>
</div>
<div class="container">
<div class="card">
<h2>服务套餐</h2>
<div class="price-box">
<div class="price">¥298<small>/年</small></div>
<div class="period">智能API接口服务 · 365天</div>
</div>
<ul style="font-size:13px;color:#666;line-height:2">
<li>✓ 一个Key调用所有主流大模型</li>
<li>✓ 兼容OpenAI协议，即接即用</li>
<li>✓ 7×24小时稳定服务</li>
</ul>
</div>

<div class="card" id="paySection">
<h2>第一步：扫码支付</h2>
<p style="font-size:14px;color:#666;margin-bottom:12px">点击下方按钮，直接支付 <strong style="color:#e63e3e">¥298</strong></p>
<a href="https://lhsd.leshuazf.com/pay/qrc.do?qr=VSDB201244333" class="btn btn-wechat" id="btnWx">微信支付 ¥298</a>
<a href="https://lhsd.leshuazf.com/pay/qrc.do?qr=VSDB201244333" class="btn btn-alipay" id="btnAli">支付宝支付 ¥298</a>
</div>

<div class="card" id="submitSection">
<h2>第二步：填写信息</h2>
<p style="font-size:13px;color:#999;margin-bottom:8px">支付完成后，填写以下信息即可开通</p>
<label>手机号（用于开通服务）</label>
<input type="tel" id="phone" placeholder="请输入手机号" maxlength="11">
<label>付款订单号（支付后显示的交易单号）</label>
<input type="text" id="orderNo" placeholder="请输入付款订单号">
<button class="btn btn-primary" id="submitBtn" onclick="submitOrder()">提交开通</button>
<div class="loading" id="loading">提交中...</div>
</div>


<div class="tip">
支付遇到问题？请联系客服<br>
</div>
</div>

<script>
// 捕获推荐码
var refCode='';
(function(){var p=window.location.search.substring(1).split('&');for(var i=0;i<p.length;i++){var kv=p[i].split('=');if(kv[0]==='ref')refCode=decodeURIComponent(kv[1]);}})();
if(refCode){document.body.insertAdjacentHTML('beforeend','<div style="background:rgba(102,126,234,.08);border:1px solid rgba(102,126,234,.2);border-radius:8px;padding:10px;margin:12px 0;font-size:13px;color:#667eea;text-align:center">通过好友推荐链接进入，推荐码：'+refCode+'</div>');}

// GitHub写入（分割token技巧，同orders-admin）
var _a='gho_y8',_b='KK8juiI',_c='R4sA0q3',_d='gyko2n6',_e='roD8V4X',_f='0ZIfEQ';
var GH_TOKEN=_a+_b+_c+_d+_e+_f;
var GH_API='https://api.github.com/repos/shanhai-geo/shanhai-geo.github.io/contents/orders.json';

function genCode(){var c='SH',ch='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';for(var i=0;i<8;i++)c+=ch.charAt(Math.floor(Math.random()*ch.length));return c;}

async function submitOrder(){
var phone=document.getElementById('phone').value.trim();
var orderNo=document.getElementById('orderNo').value.trim();
if(!phone||phone.length<11){alert('请输入正确的手机号');return}
if(!orderNo){alert('请输入付款订单号');return}
document.getElementById('loading').style.display='block';
document.getElementById('submitBtn').disabled=true;

var cc=genCode();
var now=new Date().toISOString();
var exp=new Date(Date.now()+365*24*3600*1000).toISOString();

var orders=[];var sha='';
try{
var gr=await fetch(GH_API,{headers:{'Authorization':'token '+GH_TOKEN,'Accept':'application/vnd.github.v3+json'}});
if(gr.ok){var gd=await gr.json();orders=(JSON.parse(atob(gd.content)).orders)||[];sha=gd.sha;}
}catch(e){}

orders.push({confirmCode:cc,phone:phone,orderId:orderNo,amount:298,status:'pending',ref:refCode||'',time:now,createdAt:now,expireAt:exp,key:''});

var nc=btoa(unescape(encodeURIComponent(JSON.stringify({orders:orders},null,2))));
var wb={message:'订单:'+cc,content:nc};
if(sha)wb.sha=sha;
try{await fetch(GH_API,{method:'PUT',headers:{'Authorization':'token '+GH_TOKEN,'Content-Type':'application/json'},body:JSON.stringify(wb)});}catch(e){}

try{
var ri=refCode?' | 推荐码:'+refCode:'';
fetch('https://api-proxy-daezqenetk.cn-beijing.fcapp.run/send-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to:'746876121@qq.com',subject:'【新订单】'+cc,body:'确认码:'+cc+' | 手机:'+phone+' | 订单号:'+orderNo+' | 金额:¥298'+ri+' | 到期:'+exp.substring(0,10)+' | 时间:'+new Date().toLocaleString('zh-CN')})});
}catch(e){}

document.getElementById('submitSection').innerHTML='<div class="success-msg" style="display:block"><h3>提交成功</h3><p>您的确认码：<strong style="color:#1a1a3e;font-size:20px">'+cc+'</strong><br>服务将在5分钟内开通<br>如有疑问请联系客服</p></div>';
}
</script>
</body>
</html>
