BRN: ""
Resources:
  shanhai-api:
    Properties:
      FunctionName: shanhai-api
      Runtime: nodejs14.x
      Handler: api/server.fcHandler
      Timeout: 60
      MemorySize: 256
      Code:
        ZipFile: ""
      Description: "山海云枢API网关"
      Environment:
        Variables:
          ZHIPU_API_KEY: "${ZHIPU_API_KEY}"
          SILICONFLOW_API_KEY: "${SILICONFLOW_API_KEY}"
          VOLCENGINE_API_KEY: "${VOLCENGINE_API_KEY}"
          ADMIN_KEY: "${ADMIN_KEY}"
          DATA_REGION: "bj"
          CORS_ORIGINS: "https://shanhai-geo.github.io"
          AUDIT_LOG: "true"
    Type: 'CFC::Function'
