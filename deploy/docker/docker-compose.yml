version: '3.8'
services:
  shanhai-api:
    build: .
    ports:
      - "9000:9000"
    environment:
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - VOLCENGINE_API_KEY=${VOLCENGINE_API_KEY}
      - ADMIN_KEY=${ADMIN_KEY}
      - DATA_REGION=cn-docker
      - CORS_ORIGINS=https://shanhai-geo.github.io
      - AUDIT_LOG=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
