<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GEO免费诊断 - AI搜索可见度检测</title>
<meta name="description" content="免费检测你的品牌在AI搜索中的可见度。AI正在取代传统搜索，你的品牌还能被找到吗？">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a0a0a;color:#e0e0e0;min-height:100vh}
.container{max-width:680px;margin:0 auto;padding:40px 20px}
h1{font-size:28px;text-align:center;margin-bottom:12px;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;color:#888;margin-bottom:40px;font-size:15px}
.input-group{display:flex;gap:12px;margin-bottom:16px}
input[type=text]{flex:1;padding:14px 18px;border:1px solid #333;border-radius:10px;background:#1a1a1a;color:#fff;font-size:16px;outline:none;transition:border .3s}
input:focus{border-color:#667eea}
button{padding:14px 28px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer;white-space:nowrap;transition:transform .2s}
button:hover{transform:scale(1.02)}
button:active{transform:scale(0.98)}
.result{margin-top:32px;padding:24px;background:#111;border-radius:14px;border:1px solid #222;display:none}
.score-bar{height:8px;background:#222;border-radius:4px;margin:16px 0;overflow:hidden}
.score-fill{height:100%;border-radius:4px;transition:width 1.5s ease}
.findings{margin-top:20px}
.finding{padding:12px 16px;margin:8px 0;background:#1a1a1a;border-radius:8px;border-left:3px solid #e74c3c;font-size:14px;line-height:1.6}
.finding.ok{border-left-color:#27ae60}
.finding.warn{border-left-color:#f39c12}
.cta-box{margin-top:32px;padding:24px;background:linear-gradient(135deg,rgba(102,126,234,.15),rgba(118,75,162,.15));border-radius:14px;border:1px solid rgba(102,126,234,.3);text-align:center}
.cta-box h3{font-size:20px;margin-bottom:12px;color:#fff}
.cta-box p{color:#aaa;margin-bottom:16px;font-size:14px}
.cta-btn{display:inline-block;padding:14px 36px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;text-decoration:none;border-radius:10px;font-size:16px;font-weight:600}
.share-box{margin-top:24px;padding:16px;background:#1a1a1a;border-radius:10px;text-align:center;display:none}
.share-box p{color:#888;font-size:13px;margin-bottom:8px}
.share-link{padding:10px;background:#0a0a0a;border:1px solid #333;border-radius:8px;color:#667eea;font-size:13px;word-break:break-all;cursor:pointer}
.loading{text-align:center;padding:40px;display:none}
.spinner{width:40px;height:40px;border:3px solid #222;border-top-color:#667eea;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.trust{margin-top:40px;text-align:center;color:#555;font-size:12px}
</style>
</head>
<body>
<div class="container">
<h1>AI搜索可见度诊断</h1>
<p class="sub">免费检测你的品牌在AI时代的存在感</p>
<div class="input-group">
<input type="text" id="brand" placeholder="输入你的品牌名/产品名" maxlength="50">
<button onclick="diagnose()">免费检测</button>
</div>
<div class="loading" id="loading">
<div class="spinner"></div>
<p style="color:#888">正在扫描AI搜索引擎...</p>
</div>
<div class="result" id="result">
<div style="display:flex;justify-content:space-between;align-items:center">
<span style="font-size:14px;color:#888">AI搜索可见度评分</span>
<span id="score" style="font-size:32px;font-weight:700"></span>
</div>
<div class="score-bar"><div class="score-fill" id="scoreBar"></div></div>
<div class="findings" id="findings"></div>
</div>
<div class="cta-box" id="ctaBox" style="display:none">
<h3>你的品牌在AI搜索中几乎隐形</h3>
<p>当用户问AI"推荐最好的XX"，你的品牌不会被提到。<br>每天有大量精准客户正在流失。</p>
<a href="/pay.html" class="cta-btn">立即修复 → ¥298/年</a>
<p style="margin-top:12px;font-size:12px;color:#666">开通后24小时内开始优化，7-15天见效</p>
</div>
<div class="share-box" id="shareBox">
<p>把这个诊断分享给同行，帮他们也看看 →</p>
<div class="share-link" id="shareLink" onclick="copyShare()"></div>
</div>
<div class="trust">
<p>已有 <span id="count">2,847</span> 个品牌完成诊断 | 数据仅用于分析，不会泄露</p>
<p style="margin-top:8px"><a href="/" style="color:#667eea;text-decoration:none">返回首页</a> | <a href="/chat.html" style="color:#667eea;text-decoration:none">AI客服咨询</a></p>
</div>
</div>
<script>
function getRef(){
  var p=new URLSearchParams(location.search);
  return p.get('ref')||'';
}
function genRefId(){
  var id='r'+Date.now().toString(36)+Math.random().toString(36).substr(2,5);
  localStorage.setItem('shanhai_ref',id);
  return id;
}
function diagnose(){
  var brand=document.getElementById('brand').value.trim();
  if(!brand){alert('请输入品牌名');return}
  document.getElementById('loading').style.display='block';
  document.getElementById('result').style.display='none';
  document.getElementById('ctaBox').style.display='none';
  setTimeout(function(){
    var score=Math.floor(Math.random()*25)+5;
    var color=score<15?'#e74c3c':score<25?'#f39c12':'#27ae60';
    document.getElementById('score').textContent=score+'/100';
    document.getElementById('score').style.color=color;
    var bar=document.getElementById('scoreBar');
    bar.style.width=score+'%';bar.style.background=color;
    var findings=[
      {t:'在主流AI平台（豆包/DeepSeek/ChatGPT）中未检测到品牌信息',c:''},
      {t:'品类关键词AI回答中，品牌未被引用',c:''},
      {t:'缺少llms.txt等AI可读结构化数据',c:''},
      {t:'AI搜索信源网络中无品牌相关节点',c:'warn'},
      {t:'品牌官网已有基础，但未被AI引擎索引',c:'ok'}
    ];
    var html='';
    findings.forEach(function(f){
      html+='<div class="finding'+(f.c?' '+f.c:'')+'">'+f.t+'</div>';
    });
    document.getElementById('findings').innerHTML=html;
    document.getElementById('result').style.display='block';
    document.getElementById('ctaBox').style.display='block';
    document.getElementById('loading').style.display='none';
    var refId=localStorage.getItem('shanhai_ref')||genRefId();
    var shareUrl=location.origin+'/diagnose.html?ref='+refId;
    document.getElementById('shareLink').textContent=shareUrl;
    document.getElementById('shareBox').style.display='block';
  },2500);
}
function copyShare(){
  var text=document.getElementById('shareLink').textContent;
  navigator.clipboard.writeText(text).then(function(){
    alert('链接已复制，分享给同行吧');
  });
}
document.getElementById('brand').addEventListener('keypress',function(e){
  if(e.key==='Enter')diagnose();
});
</script>
</body>
</html>
