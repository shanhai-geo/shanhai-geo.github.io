<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="cache-control" content="no-cache">
<meta http-equiv="Pragma" content="no-cache">
<title>付款 - 山海智能</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#f5f0eb;min-height:100vh;padding:20px}
.card{background:#fff;border-radius:16px;padding:24px 20px;max-width:340px;width:100%;margin:0 auto;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.1)}
.brand{font-size:13px;color:#888;margin-bottom:8px}
.qr-box{display:inline-block;padding:10px;border:2px solid #e8e0d6;border-radius:12px;background:#fff}
.qr-box img{width:200px;height:200px;display:block}
.scan-hint{font-size:14px;color:#333;font-weight:600;margin-top:14px}
.scan-sub{font-size:12px;color:#888;margin-top:6px}
.wx-btn{display:block;width:100%;padding:12px;font-size:14px;font-weight:600;color:#fff;background:#07c160;border:none;border-radius:10px;cursor:pointer;margin-top:14px}
.wx-btn:active{opacity:.85}
.divider{height:1px;background:#e8e0d6;margin:18px 0;position:relative}
.divider::after{content:"付款后在此确认";position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:#fff;padding:0 10px;font-size:12px;color:#c0392b;font-weight:600}
.input-box{width:100%;font-size:16px;padding:14px;border:2px solid #c9a96e;border-radius:10px;outline:none;text-align:center;margin-top:12px}
.input-box:focus{border-color:#8b6914}
.confirm-btn{width:100%;padding:14px;font-size:16px;font-weight:700;color:#fff;background:linear-gradient(135deg,#c9a96e,#8b6914);border:none;border-radius:10px;cursor:pointer;margin-top:12px}
.confirm-btn:active{opacity:.85}
.confirm-btn:disabled{opacity:.5;cursor:default}
.hint{font-size:11px;color:#bbb;margin-top:10px}
.result{display:none;margin-top:16px;padding:16px;background:#f0faf0;border-radius:10px;text-align:left;font-size:13px;line-height:1.8;color:#333}
.result b{color:#8b6914}
.copy-btn{display:block;width:100%;padding:10px;font-size:13px;font-weight:600;color:#8b6914;background:#fff8ee;border:1.5px solid #c9a96e;border-radius:8px;cursor:pointer;margin-top:12px}
.copy-btn:active{background:#f0e6d0}
.compliance{font-size:10px;color:#ccc;line-height:1.6;margin-top:16px}
</style>
</head>

<div class="brand">山海智能 · 智能接口服务</div>

<div class="scan-hint">微信或支付宝扫码付款</div>
<div class="scan-sub">金额已固定298元，扫码输密码即可</div>
<button class="wx-btn" onclick="copyLink()">分享到微信付款</button>
<div class="divider"></div>
<input class="input-box" id="fPhone" type="tel" placeholder="手机号（接收密钥）" maxlength="11">
<button class="confirm-btn" id="confirmBtn" onclick="confirmPay()">已付款，确认</button>
<div class="hint">7天无理由退款保障</div>
<div class="result" id="result"></div>
<div class="compliance">AI能力基于开源大模型 · 数据严格保密 · 不涉及募资</div>
</div>
<script>
function confirmPay(){
  var phone=document.getElementById('fPhone').value.trim();
  if(!phone||phone.length!==11){alert('请输入11位手机号');return}
  var oid='SH'+Date.now().toString(36).toUpperCase();
  var btn=document.getElementById('confirmBtn');
  btn.disabled=true;
  btn.textContent='已提交...';

  var now=new Date();
  var timeStr=now.getFullYear()+'-'+(now.getMonth()+1).toString().padStart(2,'0')+'-'+now.getDate().toString().padStart(2,'0')+' '+now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0')+':'+now.getSeconds().toString().padStart(2,'0');

  // 存储订单到本地（管理后台可查看）
  var orders=JSON.parse(localStorage.getItem('shanhai_orders')||'[]');
  orders.push({oid:oid,phone:phone,time:timeStr,status:'pending'});
  localStorage.setItem('shanhai_orders',JSON.stringify(orders));

  // 通过 mailto 发送订单通知到 owner 邮箱（100%可靠）
  var subject=encodeURIComponent('[山海新订单] '+oid);
  var body=encodeURIComponent('订单号：'+oid+'\n商品：山海智能接口服务 298元/年\n客户手机：'+phone+'\n确认时间：'+timeStr+'\n\n对账：请按确认时间「'+timeStr+'」前后查找298元入账，匹配手机号'+phone);
  var mailtoLink='mailto:746876121@qq.com?subject='+subject+'&body='+body;

  // 尝试打开邮件客户端发送通知
  try{
    window.location.href=mailtoLink;
  }catch(e){
    console.log('mailto打开失败',e);
  }

  // 显示确认结果
  document.getElementById('result').style.display='block';
  document.getElementById('result').innerHTML='订单号：<b>'+oid+'</b><br>手机：<b>'+phone+'</b><br>时间：<b>'+timeStr+'</b><br>状态：<b style="color:#c0392b">付款确认中</b><br><br>确认到款后通过短信交付密钥，通常1小时内完成。<br><br><span style="color:#888;font-size:11px">如邮件客户端未自动打开，请截图订单信息发送给客服</span>';

  // 同时尝试通过 Coze Bot 发送（备用通道）
  try{
    fetch('https://api.coze.cn/v3/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer pat_90mzGWPnNvVhAXHZ8dhE3o0UbKP9Q0Gl5Dx7X3ZEDQXr1bPggEt8fZss85IiCNR3'},
      body:JSON.stringify({
        bot_id:'7652290884557930559',
        user_id:'web_order',
        stream:true,
        auto_save_history:false,
        additional_messages:[{role:'user',content:'新订单通知：订单号'+oid+'，商品：山海智能接口服务298元/年，客户手机'+phone+'，时间'+timeStr+'。请记录此订单。',content_type:'text'}]
      })
    }).then(function(r){return r.text()}).then(function(d){console.log('备用通知已发送',d)}).catch(function(e){console.log('备用通知失败',e)});
  }catch(e){console.log('通知异常',e)}
}
function copyLink(){
  var url=location.href;
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){alert('链接已复制，请在微信中粘贴打开')});
  }else{
    var inp=document.createElement('textarea');
    inp.value=url;
    document.body.appendChild(inp);
    inp.select();
    document.execCommand('copy');
    document.body.removeChild(inp);
    alert('链接已复制，请在微信中粘贴打开');
  }
}
</script>
</body>
</html>
