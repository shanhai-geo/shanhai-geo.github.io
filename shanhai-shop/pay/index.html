<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="cache-control" content="no-cache">
<meta http-equiv="Pragma" content="no-cache">
<title>付款 - 山海智能</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#f5f0eb;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:32px 24px;max-width:360px;width:100%;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.1)}
.amount{font-size:36px;font-weight:900;color:#c0392b;margin:16px 0 4px}
.unit{font-size:14px;color:#888}
.pay-btn{display:block;width:100%;padding:16px;font-size:18px;font-weight:700;color:#fff;background:linear-gradient(135deg,#b8860b,#d4a028);border:none;border-radius:12px;cursor:pointer;text-decoration:none;margin-top:24px}
.pay-btn:active{opacity:.85}
.hint{font-size:12px;color:#bbb;margin-top:12px}
.wechat-tip{background:#07c160;color:#fff;padding:12px 16px;border-radius:8px;margin-top:16px;font-size:13px;display:none}
.wechat-tip a{color:#fff;font-weight:700;text-decoration:underline}
.err{color:#c0392b;font-size:14px;margin-top:16px;display:none}
</style>
</head>
<body>
<div class="card">
<div style="font-size:14px;color:#888">山海智能</div>
<div class="amount" id="amtShow">298<span class="unit">元/年</span></div>
<div style="font-size:13px;color:#666;margin-top:4px" id="prodShow">入门版 · 智能接口服务</div>
<button class="pay-btn" id="payBtn" onclick="goPay()">立即付款</button>
<div class="hint">7天无理由退款保障</div>
<div class="wechat-tip" id="wxTip">请在微信中打开本页面完成付款<br><a href="javascript:copyLink()">点此复制链接，到微信中粘贴打开</a></div>
<div class="err" id="errMsg"></div>
</div>
<script>
var PAY_URL='https://lhsd.leshuazf.com/pay/qrc.do?qr=VSDB201242145';
var isWeChat=/MicroMessenger/i.test(navigator.userAgent);

// 读取URL参数
var params=new URLSearchParams(location.search);
var amt=params.get('amt')||'298';
var prod=params.get('prod')||'入门版';
document.getElementById('amtShow').innerHTML=amt+'<span class="unit">元/年</span>';
document.getElementById('prodShow').textContent=prod+' · 智能接口服务';

function goPay(){
  if(isWeChat){
    // 微信内直接跳转，乐刷会正常处理
    location.href=PAY_URL;
  }else{
    // 非微信浏览器：尝试唤起微信
    // 方案1：尝试通过scheme唤起微信
    var wxUrl='weixin://dl/business/?url='+encodeURIComponent(PAY_URL);
    var opened=false;
    var start=Date.now();
    
    // 尝试用iframe唤起
    var ifr=document.createElement('iframe');
    ifr.src=wxUrl;
    ifr.style.display='none';
    document.body.appendChild(ifr);
    
    // 如果2秒后页面还在，说明唤起失败
    setTimeout(function(){
      document.body.removeChild(ifr);
      if(Date.now()-start<3000){
        // 唤起成功
        opened=true;
      }
      if(!opened){
        // 唤起失败，提示用户
        document.getElementById('wxTip').style.display='block';
        document.getElementById('payBtn').textContent='已复制链接，请到微信打开';
        document.getElementById('payBtn').onclick=copyLink;
      }
    },2000);
    
    // 同时也尝试直接跳转（某些安卓浏览器支持）
    window.location.href=wxUrl;
  }
}

function copyLink(){
  var url=location.href;
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){alert('链接已复制，请打开微信粘贴访问')});
  }else{
    var inp=document.createElement('textarea');
    inp.value=url;
    document.body.appendChild(inp);
    inp.select();
    document.execCommand('copy');
    document.body.removeChild(inp);
    alert('链接已复制，请打开微信粘贴访问');
  }
}

// 如果在微信中，自动跳转
if(isWeChat){
  document.getElementById('payBtn').textContent='正在跳转付款页...';
  setTimeout(function(){location.href=PAY_URL},500);
}
</script>
</body>
</html>
