.流程项:last-child{margin-bottom:0}

.流程文字{color:rgba(255,255,255,0.8);padding-top:2px}

.返回按钮{display:inline-block;margin-top:20px;padding:12px 32px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:12px;color:rgba(255,255,255,0.7);text-decoration:none;font-size:14px;font-weight:600}
