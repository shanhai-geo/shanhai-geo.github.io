<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单确认 - 山海GEO生态</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #333; font-size: 1.8em; }
        .order-info { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .order-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .order-row:last-child { border-bottom: none; }
        .order-label { color: #666; }
        .order-value { color: #333; font-weight: bold; }
        .price-display { font-size: 2.5em; color: #667eea; text-align: center; font-weight: bold; margin: 20px 0; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .btn { display: block; width: 100%; padding: 15px; text-align: center; border: none; border-radius: 10px; font-size: 1.1em; cursor: pointer; text-decoration: none; transition: opacity 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #00b894 0%, #00cec9 100%); color: white; }
        .btn-secondary { background: #f8f9fa; color: #333; border: 2px solid #ddd; }
        .btn:hover { opacity: 0.9; }
        .status { text-align: center; padding: 20px; border-radius: 10px; margin: 20px 0; display: none; }
        .status.success { background: #d4edda; color: #155724; display: block; }
        .status.error { background: #f8d7da; color: #721c24; display: block; }
        .status.loading { background: #cce5ff; color: #004085; display: block; }
        .key-display { background: #2d3436; color: #55efc4; padding: 20px; border-radius: 10px; font-family: monospace; font-size: 1.2em; word-break: break-all; margin: 15px 0; text-align: center; }
        .node-id { background: #f8f9fa; padding: 15px; border-radius: 10px; margin: 10px 0; }
        .template-info { background: #e8f4f8; padding: 15px; border-radius: 10px; margin: 10px 0; border-left: 4px solid #00b894; }
        .copy-btn { background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .hidden { display: none; }
        .fallback-notice { background: #fff3cd; padding: 10px; border-radius: 5px; color: #856404; text-align: center; font-size: 0.9em; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header"><h1>订单确认</h1></div>
            <div id="orderSection">
                <div class="order-info">
                    <div class="order-row"><span class="order-label">套餐名称</span><span class="order-value" id="planName">-</span></div>
                    <div class="order-row"><span class="order-label">套餐说明</span><span class="order-value" id="planDesc">-</span></div>
                    <div class="order-row"><span class="order-label">订单编号</span><span class="order-value" id="orderNo">-</span></div>
                    <div class="order-row"><span class="order-label">下单时间</span><span class="order-value" id="orderTime">-</span></div>
                </div>
                <div class="price-display" id="priceDisplay">¥0</div>
                <div class="btn-group">
                    <a href="#" id="payBtn" class="btn btn-primary">前往付款</a>
                    <button id="confirmBtn" class="btn btn-secondary">已付款确认</button>
                </div>
                <div class="fallback-notice hidden" id="fallbackNotice">API暂时不可用，将使用本地密钥生成模式</div>
            </div>
            <div id="successSection" class="hidden">
                <div class="status success"><h2>付款确认成功</h2><p>您的服务已开通</p></div>
                <div class="order-info"><div class="order-row"><span class="order-label">您的密钥</span></div></div>
                <div class="key-display" id="keyDisplay">-</div>
                <button class="copy-btn" onclick="copyKey()">复制密钥</button>
                <div class="node-id"><strong>节点ID：</strong><span id="nodeIdDisplay">-</span></div>
                <div class="template-info"><strong>配置模板已生成</strong><p id="templateInfo">-</p></div>
                <div class="btn-group">
                    <a href="#" id="goToService" class="btn btn-primary">查看使用说明</a>
                    <a href="../../geo-service.html" class="btn btn-secondary">返回首页</a>
                </div>
            </div>
            <div id="loadingSection" class="hidden"><div class="status loading"><p>正在处理，请稍候...</p></div></div>
            <div id="errorSection" class="hidden">
                <div class="status error"><h2>处理失败</h2><p id="errorMsg">-</p></div>
                <button class="btn btn-secondary" onclick="location.reload()">重新尝试</button>
            </div>
        </div>
    </div>
    <script>
        const PLAN_CONFIG = {
            'starter': { name: '入门版 - AI体检报告', desc: '一次性诊断', price: 298 },
            'pro': { name: '专业版 - 年度健康管家', desc: '持续优化服务', price: 998 },
            '旗舰': { name: '旗舰版 - AI时代合伙人', desc: '生态加盟代理', price: 4998 }
        };

        function generateKey() {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let key = 'shk_';
            for (let i = 0; i < 32; i++) key += chars.charAt(Math.floor(Math.random() * chars.length));
            return key;
        }

        function generateNodeId() {
            const num = (n) => String(Math.floor(Math.random() * 10000)).padStart(4, '0');
            return 'GEO-' + num() + '-' + num();
        }

        function getTemplate(plan) {
            const templates = {
                'starter': '入门版配置模板：包含Schema.json、FAQ.md、关键词表.xlsx，请在24小时内完成配置并提交审核。',
                'pro': '专业版配置模板：包含增强Schema、互引网络配置、追踪系统接入指南、季度报告模板。',
                '旗舰': '旗舰版完整包：包含全套品牌定制素材、加盟授权证书、分销系统后台账号、无限节点配置指南。'
            };
            return templates[plan] || templates['starter'];
        }

        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                plan: params.get('plan') || 'starter',
                price: params.get('price') || '298',
                from: params.get('from') || 'direct',
                orderNo: params.get('orderNo') || 'GEO' + Date.now()
            };
        }

        function initPage() {
            const params = getUrlParams();
            const plan = params.plan;
            const config = PLAN_CONFIG[plan] || PLAN_CONFIG['starter'];
            document.getElementById('planName').textContent = config.name;
            document.getElementById('planDesc').textContent = config.desc;
            document.getElementById('orderNo').textContent = params.orderNo;
            document.getElementById('orderTime').textContent = new Date().toLocaleString('zh-CN');
            document.getElementById('priceDisplay').textContent = '¥' + (params.price || config.price);
            localStorage.setItem('geo_order', JSON.stringify({ plan: plan, price: params.price || config.price, orderNo: params.orderNo, time: Date.now() }));
        }

        function copyKey() {
            const key = document.getElementById('keyDisplay').textContent;
            navigator.clipboard.writeText(key).then(() => alert('密钥已复制到剪贴板')).catch(() => {
                const ta = document.createElement('textarea'); ta.value = key; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); alert('密钥已复制到剪贴板');
            });
        }

        async function activateAPI(orderData) {
            try {
                const response = await fetch('/api/activate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(orderData) });
                if (!response.ok) throw new Error('API request failed');
                return await response.json();
            } catch (e) { console.log('API不可用，使用本地密钥生成'); return null; }
        }

        async function confirmPayment() {
            document.getElementById('orderSection').classList.add('hidden');
            document.getElementById('loadingSection').classList.remove('hidden');
            const orderData = JSON.parse(localStorage.getItem('geo_order') || '{}');
            const plan = orderData.plan || 'starter';
            let result = await activateAPI(orderData);
            if (!result || !result.key) {
                document.getElementById('fallbackNotice').classList.remove('hidden');
                result = { key: generateKey(), nodeId: generateNodeId(), local: true };
            }
            localStorage.setItem('geo_key', result.key);
            localStorage.setItem('geo_node_id', result.nodeId || generateNodeId());
            localStorage.setItem('geo_plan', plan);
            localStorage.setItem('geo_expire', Date.now() + 365 * 24 * 60 * 60 * 1000);
            document.getElementById('loadingSection').classList.add('hidden');
            document.getElementById('successSection').classList.remove('hidden');
            document.getElementById('keyDisplay').textContent = result.key;
            document.getElementById('nodeIdDisplay').textContent = localStorage.getItem('geo_node_id');
            document.getElementById('templateInfo').textContent = getTemplate(plan);
            fetch('/api/notify', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ type: 'order_confirmed', order: orderData, key: result.key, nodeId: result.nodeId }) }).catch(() => {});
        }

        document.getElementById('confirmBtn').addEventListener('click', confirmPayment);
        initPage();
    </script>
</body>
</html>
