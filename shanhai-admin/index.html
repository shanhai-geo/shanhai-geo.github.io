<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>山海智能指挥中心 V27</title>
<meta name="description" content="山海智能最高权限指挥中心">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="Content-Security-Policy" content="frame-ancestors 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src *;">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:#1a1a2e;color:#e8edf5;font-family:-apple-system,BlinkMacSystemFont,"SF Pro","PingFang SC",sans-serif;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
:root{--bg:#1a1a2e;--bg2:#16213e;--card:#0f3460;--card2:#1a1a2e;--border:#2a2a4a;--gold:#d4a04a;--gold-dim:rgba(212,160,74,.12);--blue:#3b82f6;--green:#10b981;--red:#ef4444;--cyan:#22d3ee;--purple:#8b5cf6;--text:#e8edf5;--text2:#94a3b8;--dim:#6b7280;--bubble-ai:#2a2a4a;--bubble-user:#d4a04a;--input-bg:#2a2a4a}

/* === PIN认证屏 === */
.pin-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.pin-screen.off{display:none}
.pin-title{font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--gold),#f0d68a,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;margin-bottom:4px}
.pin-sub{font-size:10px;color:var(--dim);letter-spacing:4px;margin-bottom:24px}
.pin-dots{display:flex;gap:16px;margin-bottom:20px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--dim);background:transparent;transition:all .2s}
.pin-dot.filled{border-color:var(--gold);background:var(--gold);box-shadow:0 0 8px rgba(212,160,74,.4)}
.pin-dot.error{border-color:var(--red);background:var(--red);animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
.pin-status{font-size:13px;color:var(--dim);margin-bottom:16px;text-align:center}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px}
.pin-key{width:72px;height:72px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:26px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s}
.pin-key:active{background:#1a3a5c;transform:scale(.95);border-color:var(--gold)}
.pin-key.fn{font-size:16px;color:var(--dim)}
.pin-reset{font-size:11px;color:var(--dim);margin-top:16px;cursor:pointer;opacity:.6}
.pin-hint{font-size:9px;color:var(--gold);margin-top:8px}

/* === 锁定屏 === */
.lock-screen{position:fixed;inset:0;background:rgba(26,26,46,.97);z-index:9990;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(10px)}
.lock-screen.show{display:flex}
.lock-icon{font-size:56px;margin-bottom:16px}
.lock-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.lock-desc{font-size:12px;color:var(--dim);margin-bottom:24px;text-align:center;line-height:1.6}
.lock-btn{padding:14px 36px;background:linear-gradient(135deg,var(--gold),#b8860b);border:none;border-radius:24px;color:#fff;font-size:15px;font-weight:700;cursor:pointer}

/* === IGNITION === */
.burst{position:fixed;inset:0;z-index:9998;pointer-events:none;opacity:0;transition:opacity .2s}
.burst.active{opacity:1}
.burst-bg{position:absolute;inset:0;background:radial-gradient(circle at 50% 40%,rgba(212,160,74,.35),transparent 55%);animation:bExpand .8s ease-out forwards}
@keyframes bExpand{0%{transform:scale(0);opacity:1}100%{transform:scale(3.5);opacity:0}}
.burst-text{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-size:32px;font-weight:900;color:var(--gold);letter-spacing:8px;opacity:0;animation:bText .6s ease-out .3s forwards;text-shadow:0 0 40px rgba(212,160,74,.7)}
@keyframes bText{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}

/* === 主应用 === */
#mainApp{display:none;flex-direction:column;height:100%}
#mainApp.active{display:flex}

/* === 顶部栏 === */
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:52px;background:#16213e;border-bottom:1px solid var(--border);flex-shrink:0}
.ch-left{display:flex;align-items:center;gap:10px}
.ch-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#b8860b);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.ch-name{font-size:16px;font-weight:700;color:var(--text)}
.ch-status{font-size:10px;color:var(--green);display:flex;align-items:center;gap:4px}
.ch-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.header-right{display:flex;align-items:center;gap:8px}
.shield-badge{font-size:9px;padding:3px 8px;border-radius:10px;font-weight:600}
.shield-badge.on{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.shield-badge.off{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.ver-badge{font-size:9px;padding:3px 8px;border-radius:6px;background:var(--gold-dim);color:var(--gold);border:1px solid rgba(212,160,74,.25)}
.menu-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:20px;cursor:pointer;background:none;border:none}

/* === 聊天区域 === */
.chat-area{flex:1;overflow-y:auto;padding:12px 14px;-webkit-overflow-scrolling:touch;background:var(--bg)}
.chat-area::-webkit-scrollbar{width:3px}
.chat-area::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

.time-divider{text-align:center;margin:16px 0;font-size:11px;color:var(--dim);background:var(--bg);padding:4px 0}

/* === 微信式气泡消息 === */
.msg{display:flex;gap:10px;margin-bottom:16px;animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.msg-ai{flex-direction:row}
.msg-user{flex-direction:row-reverse}

.msg-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff}
.msg-ai .msg-avatar{background:linear-gradient(135deg,var(--gold),#b8860b)}
.msg-user .msg-avatar{background:linear-gradient(135deg,var(--cyan),var(--blue))}

.msg-content{max-width:75%;position:relative}

/* 气泡本体 - 微信风格 */
.msg-bubble{position:relative;padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.65;word-break:break-word}
.msg-bubble *{max-width:100%}

/* AI气泡 - 浅色背景右侧三角 */
.msg-ai .msg-bubble{background:var(--bubble-ai);color:var(--text);border-top-left-radius:4px}
.msg-ai .msg-bubble::before{content:'';position:absolute;left:-7px;top:10px;width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-right:8px solid var(--bubble-ai)}

/* 用户气泡 - 金色背景左侧三角 */
.msg-user .msg-bubble{background:var(--bubble-user);color:#fff;border-top-right-radius:4px}
.msg-user .msg-bubble::before{content:'';position:absolute;right:-7px;top:10px;width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-left:8px solid var(--bubble-user)}

/* 气泡内嵌内容 */
.msg-bubble .result-box{background:rgba(0,0,0,.15);border-radius:12px;padding:10px 12px;margin-top:8px;font-size:12px;line-height:1.7}
.msg-bubble .result-box .rb-title{color:var(--gold);font-weight:700;font-size:12px;margin-bottom:6px}
.msg-bubble .result-box .rb-item{padding:2px 0;color:var(--text2);font-size:11px}
.msg-bubble .result-box .rb-item .on{color:var(--green);font-weight:600}
.msg-bubble .result-box .rb-item .off{color:var(--red);font-weight:600}

.msg-bubble .engine-card{background:rgba(0,0,0,.15);border:1px solid var(--border);border-radius:12px;padding:12px;margin-top:8px}
.msg-bubble .engine-card .ec-num{color:var(--gold);font-weight:800;font-size:18px}
.msg-bubble .engine-card .ec-name{color:var(--text);font-weight:700;font-size:13px}
.msg-bubble .engine-card .ec-desc{color:var(--dim);font-size:10px;margin-top:2px}

/* 消息时间 */
.msg-time{font-size:10px;color:var(--dim);margin-top:4px}
.msg-user .msg-time{text-align:right}

/* === 快捷标签 === */
.quick-area{flex-shrink:0;padding:8px 10px;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:#16213e;border-top:1px solid var(--border)}
.quick-area::-webkit-scrollbar{display:none}
.qk{flex-shrink:0;padding:7px 14px;border-radius:16px;font-size:11px;color:var(--text2);background:var(--card);border:1px solid var(--border);cursor:pointer;white-space:nowrap;transition:all .15s}
.qk:active{transform:scale(.95);background:#1a3a5c}
.qk-gold{color:var(--gold);border-color:rgba(212,160,74,.3);background:var(--gold-dim)}
.qk-green{color:var(--green);border-color:rgba(16,185,129,.3)}

/* === 微信式底部输入栏 === */
.input-bar{flex-shrink:0;display:flex;align-items:flex-end;gap:10px;padding:10px 12px 12px;background:#16213e;border-top:1px solid var(--border)}
.input-wrap{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:22px;padding:10px 16px;display:flex;align-items:flex-end;min-height:44px;max-height:90px;transition:border-color .2s}
.input-wrap:focus-within{border-color:var(--gold)}
.input-wrap textarea{width:100%;border:none;background:transparent;color:var(--text);font-size:15px;line-height:1.5;resize:none;outline:none;max-height:70px;font-family:inherit}
.input-wrap textarea::placeholder{color:var(--dim)}
.send-btn{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#b8860b);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;box-shadow:0 2px 8px rgba(212,160,74,.35)}
.send-btn:active{transform:scale(.9)}
.send-btn svg{width:20px;height:20px;fill:#fff}
.send-btn.disabled{opacity:.35;pointer-events:none}

/* === 侧边菜单 === */
.menu-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:199}
.menu-overlay.show{display:block}
.side-menu{display:none;position:fixed;top:0;right:0;bottom:0;width:250px;background:#16213e;z-index:200;border-left:1px solid var(--border);padding:16px;animation:slideIn .25s ease;overflow-y:auto}
.side-menu.show{display:block}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.side-menu .sm-close{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--dim);font-size:22px;cursor:pointer}
.side-menu .sm-profile{padding:28px 0 14px;border-bottom:1px solid var(--border);margin-bottom:10px}
.side-menu .sm-name{font-size:15px;font-weight:700;color:var(--gold)}
.side-menu .sm-role{font-size:10px;color:var(--dim);margin-top:2px}
.side-menu .sm-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05);color:var(--text2);font-size:13px;cursor:pointer}
.side-menu .sm-item:active{color:var(--gold)}
.side-menu .sm-icon{font-size:16px;width:22px;text-align:center}
.side-menu .sm-section{font-size:9px;color:var(--dim);letter-spacing:1px;font-weight:700;margin:14px 0 6px;text-transform:uppercase}
.side-menu a{display:block;padding:8px 0;color:var(--cyan);font-size:12px;text-decoration:none}

/* === 详情弹窗 === */
.detail-modal{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;overflow-y:auto;max-width:480px;margin:0 auto}
.detail-modal.show{display:block}
.dm-header{display:flex;align-items:center;padding:14px 16px;background:#16213e;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2}
.dm-header button{background:none;border:none;color:var(--gold);font-size:15px;cursor:pointer;padding:4px 8px}
.dm-header span{font-size:15px;font-weight:700;color:var(--text);margin-left:12px}
.dm-body{padding:16px}

.mcard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.mcard h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.mcard h3 .dot{width:6px;height:6px;border-radius:50%}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.mrow:last-child{border-bottom:none}
.mrow .mlabel{font-size:12px;color:var(--text2)}
.mrow .mval{font-size:13px;font-weight:600;color:var(--text)}
.mrow .mval.gn{color:var(--green)}.mrow .mval.gd{color:var(--gold)}.mrow .mval.cy{color:var(--cyan)}.mrow .mval.rd{color:var(--red)}.mrow .mval.pp{color:var(--purple)}

.switch{width:42px;height:24px;border-radius:12px;background:var(--border);position:relative;cursor:pointer;transition:all .25s;flex-shrink:0}
.switch.on{background:var(--green)}
.switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:all .25s}
.switch.on::after{left:20px}

.link-btn{display:inline-block;padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--cyan);text-decoration:none;font-size:12px;font-weight:600;margin:4px 4px 4px 0}
.link-btn:active{background:#1a3a5c;color:var(--gold)}

.dna-box{background:var(--card);border:1px solid rgba(139,92,246,.2);border-radius:16px;padding:14px;margin-top:10px}
.dna-box h3{font-size:12px;font-weight:700;color:var(--purple);margin-bottom:6px}
.dna-box p{font-size:10px;color:var(--text2);line-height:1.8}

/* 总开关 */
.master-box{background:linear-gradient(135deg,rgba(212,160,74,.08),rgba(139,92,246,.05));border:1px solid rgba(212,160,74,.25);border-radius:16px;padding:18px;margin-bottom:14px;text-align:center}
.master-box .ms-label{font-size:10px;color:var(--dim);letter-spacing:2px;margin-bottom:8px}
.master-box .ms-state{font-size:22px;font-weight:900;margin-bottom:4px}
.master-box .ms-state.open{color:var(--green)}.master-box .ms-state.closed{color:var(--red)}.master-box .ms-state.sealed{color:var(--purple)}
.master-box .ms-desc{font-size:10px;color:var(--text2)}
.ms-toggle{width:68px;height:36px;border-radius:18px;position:relative;cursor:pointer;margin:12px auto;display:block;border:2px solid var(--border);transition:all .3s}
.ms-toggle.open{background:var(--green);border-color:var(--green)}
.ms-toggle.closed{background:var(--red);border-color:var(--red)}
.ms-toggle.sealed{background:var(--purple);border-color:var(--purple)}
.ms-toggle::after{content:'';position:absolute;top:2px;left:2px;width:28px;height:28px;border-radius:50%;background:#fff;transition:all .3s}
.ms-toggle.open::after,.ms-toggle.closed::after,.ms-toggle.sealed::after{left:34px}
.ms-actions{display:flex;gap:8px;margin-top:10px;justify-content:center}

/* 防护盾 */
.shield-panel{background:var(--card);border:2px solid var(--purple);border-radius:16px;padding:16px;margin-bottom:12px}
.shield-panel h3{font-size:15px;font-weight:900;color:var(--purple);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.shield-row{display:flex;justify-content:space-between;padding:8px 0;font-size:12px;border-bottom:1px solid rgba(139,92,246,.1)}
.shield-row:last-child{border-bottom:none}
.shield-row .sl{color:var(--text2)}.shield-row .sv{font-weight:700}
.shield-row .sv.ok{color:var(--green)}.shield-row .sv.no{color:var(--red)}.shield-row .sv.gene{color:var(--purple)}
.shield-toggle{display:flex;align-items:center;justify-content:space-between;padding:12px;background:linear-gradient(135deg,rgba(139,92,246,.06),rgba(212,160,74,.04));border:1px solid rgba(139,92,246,.2);border-radius:12px;margin-bottom:12px}
.shield-toggle .st-icon{font-size:22px}
.shield-toggle .st-name{font-size:14px;font-weight:700;color:var(--text)}
.shield-toggle .st-desc{font-size:10px;color:var(--dim)}
.st-sw{width:50px;height:28px;border-radius:14px;background:var(--border);position:relative;cursor:pointer;transition:all .3s}
.st-sw.on{background:var(--purple);box-shadow:0 0 12px rgba(139,92,246,.4)}
.st-sw::after{content:'';position:absolute;top:2px;left:2px;width:24px;height:24px;border-radius:50%;background:#fff;transition:all .3s}
.st-sw.on::after{left:24px}

.gene-seal{background:linear-gradient(135deg,rgba(139,92,246,.1),rgba(212,160,74,.08));border:2px solid var(--purple);border-radius:14px;padding:16px;text-align:center;margin-top:10px}
.gene-seal .gs-label{font-size:10px;color:var(--dim);letter-spacing:2px}
.gene-seal .gs-dna{font-size:18px;font-weight:900;color:var(--purple);margin:8px 0;font-family:monospace;letter-spacing:3px}

/* 支付弹窗 */
.pay-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;justify-content:center;align-items:center;flex-direction:column}
.pay-modal.show{display:flex}
.pay-modal img{width:220px;height:220px;border-radius:12px;border:3px solid var(--gold);margin-bottom:12px}
.pay-modal .tip{color:#fff;font-size:12px;text-align:center;line-height:1.7;padding:0 20px}
.pay-modal .close-btn{margin-top:16px;padding:8px 24px;background:rgba(255,255,255,.1);color:#fff;border:none;border-radius:20px;font-size:13px;cursor:pointer}

/* Toast */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-50px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:12px;color:var(--text);z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-gold{border-color:rgba(212,160,74,.4);color:var(--gold)}
.toast-green{border-color:rgba(16,185,129,.4);color:var(--green)}

/* 打字动画 */
.typing-dots{display:inline-flex;gap:4px;align-items:center}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--dim);animation:typing 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,80%{opacity:.3}40%{opacity:1}}

/* 防护盾视觉层 */
.dna-overlay{position:fixed;inset:0;z-index:9990;pointer-events:none;opacity:0;transition:opacity .5s}
.dna-overlay.active{opacity:1;background:linear-gradient(180deg,rgba(139,92,246,.04) 0%,transparent 25%,transparent 75%,rgba(139,92,246,.04) 100%)}
.dna-badge{position:fixed;top:4px;left:50%;transform:translateX(-50%);z-index:9991;padding:3px 14px;border-radius:0 0 10px 10px;font-size:9px;font-weight:800;letter-spacing:2px;display:none;background:rgba(139,92,246,.2);color:var(--purple);border:1px solid rgba(139,92,246,.3);border-top:none}
.dna-badge.active{display:block}
</style>
</head>
<body>
<!-- 防护盾视觉层 -->
<div class="dna-overlay" id="dnaOverlay"></div>
<div class="dna-badge" id="dnaBadge">DNA SHIELD</div>

<!-- 防注入 -->
<script>if(window.top!==window.self){window.top.location=window.self.location;throw new Error('iframe blocked')}</script>

<div class="toast" id="toast"></div>

<!-- 锁定屏 -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-icon">&#x1F512;</div>
  <div class="lock-title">会话已锁定</div>
  <div class="lock-desc">无操作超时或操作次数已达上限<br>请重新验证身份</div>
  <button class="lock-btn" onclick="showPinScreen()">重新验证</button>
</div>

<!-- PIN认证 -->
<div class="pin-screen" id="pinScreen">
  <div class="pin-title">山海指挥中心</div>
  <div class="pin-sub">SOVEREIGNTY TRANSFER</div>

var SESSION={
  TIMEOUT:15*60*1000,
  MAX_OP:30,
  opCount:0,
  lastActive:Date.now(),
  locked:false,
  init:function(){
    sessionStorage.removeItem('sh_session');
    this.opCount=0;
    this.lastActive=Date.now();
    this.locked=false;
  },
  activate:function(){
    sessionStorage.setItem('sh_session','1');
    this.opCount=0;
    this.lastActive=Date.now();
    this.locked=false;
  },
  check:function(){
    if(!sessionStorage.getItem('sh_session'))return false;
    if(Date.now()-this.lastActive>this.TIMEOUT){this.lock();return false}
    if(this.opCount>=this.MAX_OP){this.lock();return false}
    return true;
  },
  record:function(){
    this.lastActive=Date.now();
    this.opCount++;
    if(this.opCount>=this.MAX_OP)this.lock();
  },
  lock:function(){
    this.locked=true;
    sessionStorage.removeItem('sh_session');
    document.getElementById('mainApp').classList.remove('active');
    document.getElementById('lockScreen').classList.add('show');
  },
  unlock:function(){
    this.locked=false;
    this.activate();
    document.getElementById('lockScreen').classList.remove('show');
    document.getElementById('mainApp').classList.add('active');
  }
};

var PIN={
  input:'',storedPin:null,handover:'602138',attempts:0,resetMode:false,
  getStored:function(){
    if(!this.storedPin)this.storedPin=localStorage.getItem('sh_pin')||null;
    return this.storedPin;
  },
  set:function(pin){localStorage.setItem('sh_pin',pin);this.storedPin=pin;toast('通行码已设置','gold')},
  verify:function(code){
    if(this.resetMode){
      if(code===this.handover){
        this.resetMode=false;
        document.getElementById('pinStatus').textContent='设置新通行码';
        this.input='';this.updateDots(0);
        return'reset_confirm';
      }
      return'wrong_handover';
    }
    var s=this.getStored();
    if(s&&code===s)return'ok';
    if(code===this.handover)return'handover';
    return'wrong';
  },
  updateDots:function(n){
    for(var i=0;i<6;i++){
      var d=document.getElementById('pd'+i);
      d.className='pin-dot'+(i<n?' filled':'');
    }
  }
};

function initPin(){
  document.getElementById('pinScreen').classList.remove('off');
  sessionStorage.removeItem('sh_session');
}

function pinIn(d){
  if(PIN.input.length>=6)return;
  PIN.input+=d;
  PIN.updateDots(PIN.input.length);
  var r=PIN.verify(PIN.input);
  if(r==='ok'){correctPin();return}
  if(r==='handover'){
    document.getElementById('pinStatus').textContent='交接码正确...';
    setTimeout(function(){
      if(PIN.getStored()){
        document.getElementById('pinStatus').textContent='验证通过';
        setTimeout(correctPin,500);
      }else{
        document.getElementById('pinStatus').textContent='首次使用，请设通行码';
        PIN.input='';PIN.updateDots(0);
      }
    },400);
    return;
  }
  if(r==='wrong'){
    PIN.attempts++;
    showPinError();
    if(PIN.attempts>=3)document.getElementById('pinReset').style.display='block';
  }
}

function pinClear(){PIN.input='';PIN.updateDots(0)}
function pinBack(){PIN.input=PIN.input.slice(0,-1);PIN.updateDots(PIN.input.length)}

function showPinError(){
  for(var i=0;i<6;i++)document.getElementById('pd'+i).className='pin-dot error';
  document.getElementById('pinStatus').textContent='密码错误';
  setTimeout(function(){PIN.input='';PIN.updateDots(0);document.getElementById('pinStatus').textContent='请重新输入'},800);
}

  match:function(cmd){

function calcRev(){var p=0,r=0,d=0;for(var i=0;i<orders.length;i++){if(orders[i].paid||orders[i].status==='delivered'){p++;r+=orders[i].price||orders[i].amt||0}if(orders[i].delivered||orders[i].status==='delivered')d++}return{paid:p,revenue:r,delivered:d,total:orders.length}}
function genKey(){var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';var k='SK-';for(var i=0;i<4;i++){for(var j=0;j<4;j++){k+=c[Math.floor(Math.random()*c.length)]}if(i<3)k+='-'}return k}

  var allOrders=JSON.parse(localStorage.getItem('sh_orders')||'[]');

  }
  h+='</div>';
  return h;

function confirmOrder(oid){
  var orders=JSON.parse(localStorage.getItem('sh_orders')||'[]');
  var found=false;
  for(var i=0;i<orders.length;i++){
    if(orders[i].oid===oid||orders[i].id===oid){
      if(orders[i].key){addAi('订单'+oid+'已交付Key:'+orders[i].key);found=true;break}
      var key=genKey();
      orders[i].key=key;
      orders[i].status='delivered';
      orders[i].delivered=true;
      orders[i].paid=true;
      found=true;
      break;
    }
  }
  if(!found){addAi('未找到订单:'+oid);return}
  localStorage.setItem('sh_orders',JSON.stringify(orders));
  var o=orders.find(function(x){return(x.oid||x.id)===oid});
  addAi('[交付成功]\n\n订单号:'+oid+'\nKey:'+o.key+'\n金额:¥'+(o.amt||o.price||298)+'\n\n请将Key告知客户');
  SH_NOTIFY.push('订单','订单'+oid+'已交付','ok');
}

// === 通知体系 ===
var SH_NOTIFY={
  KEY:'sh_notifications',MAX:100,
  load:function(){return JSON.parse(localStorage.getItem(this.KEY)||'[]')},
  save:function(ns){localStorage.setItem(this.KEY,JSON.stringify(ns))},
  push:function(type,msg,level){
    var ns=this.load();
    ns.unshift({type:type,msg:msg,level:level||'info',time:new Date().toLocaleString('zh-CN'),read:false,id:Date.now()});
    if(ns.length>this.MAX)ns=ns.slice(0,this.MAX);
    this.save(ns);
  },
  markRead:function(){var ns=this.load();ns.forEach(function(n){n.read=true});this.save(ns)},
  unread:function(){return this.load().filter(function(n){return!n.read})},
  autoCheck:function(){
    var self=this;
    var orders=JSON.parse(localStorage.getItem('sh_orders')||'[]');
    var paid=orders.filter(function(o){return o.paid});
    if(paid.length>0)this.push('订单','待交付:'+paid.length+'笔','warn');
    var ms=localStorage.getItem('sh_master')||'open';
    if(ms!=='open')this.push('安全','总开关:'+ms,'');
    this.push('系统','指挥中心'+CHIP.VERSION+'启动完成','ok');
  },
  showCenter:function(){
    var ns=this.load();var unread=this.unread().length;
    var h='<div class="result-box"><div class="rb-title">通知中心 ('+ns.length+'条'+(unread>0?' · '+unread+'未读':'')+')</div>';
    if(ns.length===0){h+='<div class="rb-item">暂无通知</div>'}else{
      ns.slice(0,15).forEach(function(n){
        var icon=n.level==='ok'?'[OK]':n.level==='err'?'[!]':n.level==='warn'?'[W]':'[i]';
        h+='<div class="rb-item" style="'+(n.read?'color:var(--dim)':'')+'">'+icon+' '+n.type+':'+n.msg+'</div>';
      });
    }
    h+='</div>';
    return h;
  }
};
