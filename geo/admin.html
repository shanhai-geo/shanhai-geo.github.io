<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>山海订单管理</title>

<style>
:root{--bg:#0a0a14;--bg2:#12121f;--bg3:#1a1a2e;--gold:#c9a96e;--text:#e0e0e0;--text2:#999;--border:#2a2a3e;--ok:#4caf50;--warn:#ff9800;--err:#f44336}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:var(--bg);color:var(--text);padding:20px;line-height:1.6}
h1{color:var(--gold);font-size:20px;margin-bottom:16px}
h2{color:var(--gold);font-size:16px;margin:20px 0 12px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center}
.stat-num{font-size:24px;font-weight:700;color:var(--gold)}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px}
.order-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
.order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.order-id{font-weight:600;color:var(--gold)}
.status-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600}
.status-open{background:rgba(255,152,0,.15);color:var(--warn)}
.status-closed{background:rgba(76,175,80,.15);color:var(--ok)}
.order-info{font-size:13px;color:var(--text2);line-height:1.8}
.order-info span{color:var(--text)}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600}
.btn-deliver{background:var(--ok);color:#fff}
.btn-link{background:transparent;color:var(--gold);border:1px solid var(--gold)}
.btn:hover{opacity:.85}
.action-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.action-bar button{padding:8px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-size:13px}
.action-bar button:hover{border-color:var(--gold)}
.key-gen{background:var(--bg3);padding:12px;border-radius:6px;margin-top:12px;font-family:monospace;color:var(--gold);word-break:break-all;font-size:13px}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{padding:8px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;font-size:13px}
.tab.active{border-color:var(--gold);color:var(--gold)}
.empty{text-align:center;color:var(--text2);padding:40px}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}}
</style>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
</head>
<body>
<h1>山海订单管理</h1>
<div class="tabs">
  <div class="tab active" onclick="switchTab('pending')">待确认</div>
  <div class="tab" onclick="switchTab('done')">已交付</div>
</div>
<div class="action-bar">
  <button onclick="loadOrders()">刷新</button>
  <button onclick="window.open('https://github.com/shanhai-geo/shanhai-geo.github.io/issues','_blank')">GitHub Issues</button>
</div>

<div class="stats" id="statsArea"></div>
<div id="orderList"></div>

<script>
const OWNER='shanhai-geo', REPO='shanhai-geo.github.io';
let currentTab = 'pending';
let allIssues = [];

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  renderOrders();
}

function genKey() {
  const chars='abcdefghijklmnopqrstuvwxyz0123456789';
  let k='sk-shanhai-';
  for(let i=0;i<32;i++) k+=chars[Math.floor(Math.random()*chars.length)];
  return k;
}

async function loadOrders() {
  document.getElementById('orderList').innerHTML='<div class="empty">加载中...</div>';
  try {
    const resp = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues?labels=order&state=all&per_page=100`, {
      headers:{'Accept':'application/vnd.github.v3+json'}
    });
    allIssues = await resp.json();
    
    // 统计
    const pending = allIssues.filter(i=>i.state==='open'&&i.labels.some(l=>l.name==='order'));
    const done = allIssues.filter(i=>i.state==='closed'&&i.labels.some(l=>l.name==='order'));
    
    document.getElementById('statsArea').innerHTML = `
      <div class="stat-card"><div class="stat-num">${pending.length}</div><div class="stat-label">待确认</div></div>
      <div class="stat-card"><div class="stat-num">${done.length}</div><div class="stat-label">已交付</div></div>
      <div class="stat-card"><div class="stat-num">${allIssues.length}</div><div class="stat-label">总订单</div></div>
      <div class="stat-card"><div class="stat-num">¥${calcTotal(done)}</div><div class="stat-label">已交付金额</div></div>`;
    
    renderOrders();
  } catch(e) {
    document.getElementById('orderList').innerHTML='<div class="empty">加载失败，请刷新</div>';
  }
}

function calcTotal(issues) {
  return issues.reduce((sum, i) => {
    const m = i.title.match(/¥(\d+)/);
    return sum + (m ? parseInt(m[1]) : 0);
  }, 0);
}

function parseOrder(issue) {
  const body = issue.body || '';
  const get = (label) => {
    const m = body.match(new RegExp(label + '[：:]\\s*(.+?)(?:\\n|$)'));
    return m ? m[1].trim() : '-';
  };
  const keyMatch = body.match(/API密钥：([\w-]+)/);
  return {
    orderId: get('订单号'),
    plan: get('套餐'),
    name: get('姓名'),
    phone: get('手机号'),
    email: get('邮箱'),
    time: get('下单时间'),
    status: get('状态'),
    key: keyMatch ? keyMatch[1] : null,
    issueUrl: issue.html_url,
    number: issue.number,
    state: issue.state,
    labels: issue.labels
  };
}

function renderOrders() {
  const list = currentTab === 'pending' 
    ? allIssues.filter(i=>i.state==='open'&&i.labels.some(l=>l.name==='order'))
    : allIssues.filter(i=>i.state==='closed');
  
  if (!list.length) {
    document.getElementById('orderList').innerHTML = `<div class="empty">${currentTab==='pending'?'暂无待确认订单':'暂无已交付订单'}</div>`;
    return;
  }
  
  document.getElementById('orderList').innerHTML = list.map(issue => {
    const o = parseOrder(issue);
    return `
    <div class="order-card">
      <div class="order-header">
        <span class="order-id">${o.orderId}</span>
        <span class="status-badge ${o.state==='open'?'status-open':'status-closed'}">${o.state==='open'?'待确认':'已交付'}</span>
      </div>
      <div class="order-info">
        <div>姓名：<span>${o.name}</span> | 手机：<span>${o.phone}</span> | 邮箱：<span>${o.email}</span></div>
        <div>套餐：<span>${o.plan}</span> | 时间：<span>${o.time}</span></div>
        ${o.key ? `<div>密钥：<span style="color:var(--gold)">${o.key}</span></div>` : ''}
      </div>
      ${o.state==='open' ? `
        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-deliver" onclick="confirmDeliver(${o.number},'${o.phone}','${o.email}','${o.orderId}')">确认交付</button>
          <a class="btn btn-link" href="${o.issueUrl}" target="_blank">查看Issue</a>
        </div>
        <div id="keyArea-${o.number}" style="display:none"></div>
      ` : `
        <a class="btn btn-link" href="${o.issueUrl}" target="_blank" style="display:inline-block;margin-top:8px;text-decoration:none">查看Issue</a>
      `}
    </div>`;
  }).join('');
}

/* ===== 通过 FormSubmit 自动发邮件给客户（零注册、零配置） ===== */
async function sendKeyEmail(customerEmail, orderId, key, planName, customerName) {
  try {
    const formData = new URLSearchParams();
    formData.append('_subject', '【山海AI】您的API密钥已交付 - ' + orderId);
    formData.append('_template', 'table');
    formData.append('_captcha', 'false');
    formData.append('客户', customerName || '用户');
    formData.append('订单号', orderId);
    formData.append('套餐', planName || '');
    formData.append('API密钥', key);
    formData.append('接入地址', 'https://shanhai-geo.github.io/geo/api-service.html');
    formData.append('接入代码', 'from openai import OpenAI\nclient = OpenAI(api_key="' + key + '", base_url="https://shanhai-api.animated-farm.workers.dev/v1/")');
    formData.append('_replyto', '746876121@qq.com');

    const resp = await fetch('https://formsubmit.co/ajax/' + encodeURIComponent(customerEmail), {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/json' },
      body: formData.toString()
    });
    if (resp.ok) return { success: true };
    return { success: false, error: 'HTTP ' + resp.status };
  } catch (e) {
    return { success: false, error: e.message || '网络错误' };
  }
}

/* ===== 核实到账确认（防止未付款就交付） ===== */
function confirmDeliver(number, phone, email, orderId) {
  if (confirm('【重要】请确认：\n\n1. 已核实该订单款项已到账\n2. 确认无误后点击"确定"\n\n系统将自动生成密钥并邮件发送给客户。')) {
    deliverOrder(number, phone, email, orderId);
  }
}

/* ===== 确认交付 ===== */
async function deliverOrder(number, phone, email, orderId) {
  const key = genKey();
  const issue = allIssues.find(i => i.number === number);
  const planMatch = issue?.title.match(/¥(\d+)/);
  const price = planMatch ? planMatch[1] : '';
  const planNames = {'298':'入门版', '998':'成长版', '2998':'旗舰版'};
  const planName = planNames[price] || price + '元套餐';
  const customerName = issue?.body?.match(/姓名[：:]\s*(.+?)(?:\n|$)/)?.[1]?.trim() || '';
  
  // 禁用按钮，防止重复点击
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '交付中...';
  
  // 1. 在Issue中评论密钥并关闭Issue
  const commentBody = '✅ 已确认交付\n\nAPI密钥：' + key + '\n交付时间：' + new Date().toLocaleString('zh-CN', {timeZone:'Asia/Shanghai'});
  
  try {
    // 添加评论
    await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues/${number}/comments`, {
      method: 'POST',
      headers: {'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json'},
      body: JSON.stringify({body: commentBody})
    });
    // 关闭Issue
    await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues/${number}`, {
      method: 'PATCH',
      headers: {'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json'},
      body: JSON.stringify({state: 'closed'})
    });
    
    // 2. 通过FormSubmit自动发邮件给客户（零注册）
    let emailStatus = '密钥已记录到Issue';
    let emailOk = false;
    if (email && email !== '-' && email.indexOf('@') > 0) {
      const result = await sendKeyEmail(email, orderId, key, planName, customerName);
      if (result.success) {
        emailStatus = '密钥邮件已自动发送至 ' + email;
        emailOk = true;
      } else {
        emailStatus = '邮件发送失败(' + result.error + ')，密钥: ' + key;
      }
    } else {
      emailStatus = '客户未留邮箱，密钥已记录到Issue';
    }
    
    // 3. 显示结果
    const area = document.getElementById('keyArea-' + number);
    area.style.display = 'block';
    area.innerHTML = `
      <div class="key-gen">
        <div style="margin-bottom:8px;color:var(--ok)">✅ 已交付</div>
        <div>密钥：${key}</div>
        <div style="margin-top:4px;color:${emailOk ? 'var(--text2)' : 'var(--warn)'};font-size:12px">${emailStatus}</div>
        ${!emailOk ? `<button onclick="navigator.clipboard.writeText('${key}');this.textContent='已复制'" style="margin-top:6px;padding:4px 12px;background:var(--gold);color:#000;border:none;border-radius:4px;font-size:12px;cursor:pointer">复制密钥</button>` : ''}
      </div>`;
    
    // 刷新列表
    setTimeout(loadOrders, 1000);
  } catch(err) {
    btn.disabled = false;
    btn.textContent = '确认交付';
    alert('操作失败：' + err.message + '\n密钥已生成：' + key + '\n请手动在GitHub Issue中关闭并通知客户。');
  }
}

loadOrders();
</script>
</body>
</html>
