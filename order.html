<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订单确认 - 唤通·AI统调</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;background:#06060e;color:#e8e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{max-width:480px;width:100%;background:rgba(18,18,36,.9);border:1px solid rgba(255,215,0,.15);border-radius:24px;padding:40px 30px;backdrop-filter:blur(24px)}
.logo{text-align:center;font-size:48px;margin-bottom:16px}
h1{text-align:center;color:#ffd700;font-size:22px;margin-bottom:8px}
.sub{text-align:center;color:#8a8aa0;font-size:13px;margin-bottom:32px}
.form-group{margin-bottom:20px}
label{display:block;color:#ffd700;font-size:13px;margin-bottom:6px;font-weight:600}
input,select,textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#e8e8f0;padding:12px 16px;border-radius:12px;font-size:14px;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:rgba(255,215,0,.4)}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,.25)}
select option{background:#1a1a2e;color:#e8e8f0}
textarea{resize:none;height:60px}
.btn{display:block;width:100%;background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;padding:16px;border:none;border-radius:28px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:24px;transition:all .2s}
.btn:hover{transform:scale(1.02);box-shadow:0 0 30px rgba(255,215,0,.3)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.note{text-align:center;color:#8a8aa0;font-size:12px;margin-top:16px;line-height:1.6}
.note strong{color:#ffd700}
.success{display:none;text-align:center;padding:20px 0}
.success .check{font-size:64px;margin-bottom:16px}
.success h2{color:#ffd700;font-size:20px;margin-bottom:12px}
.success p{color:#8a8aa0;font-size:14px;line-height:1.8}
.key-box{margin:20px 0;padding:16px;background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.3);border-radius:12px;text-align:left}
.key-box label{color:#ffd700;font-size:12px;margin-bottom:8px;display:block}
.key-value{font-family:monospace;font-size:14px;color:#ffd700;word-break:break-all;padding:10px;background:rgba(0,0,0,.3);border-radius:8px;cursor:pointer;position:relative}
.key-value:active{background:rgba(255,215,0,.1)}
.copy-hint{font-size:11px;color:#8a8aa0;margin-top:8px;text-align:center}
.api-doc{margin-top:16px;padding:12px;background:rgba(255,255,255,.03);border-radius:8px;text-align:left;font-size:12px;color:#8a8aa0;line-height:1.8}
.api-doc code{color:#ffd700;font-family:monospace;background:rgba(255,215,0,.08);padding:2px 6px;border-radius:4px}
</style>
</head>
<body>
<div class="card">
<div id="formView">
<div class="logo">🏔</div>
<h1>订单确认</h1>
<p class="sub">付款后填写信息，API Key自动生成并发到你邮箱</p>

<div class="form-group">
<label>选择套餐</label>
<select id="plan">
<option value="basic">基础版 ¥298/年 — 包年不限量</option>
<option value="pro">专业版 ¥998/年 — 50次+品牌诊断</option>
<option value="enterprise">企业版 ¥2998/年 — 100次+专属定制</option>
</select>
</div>

<div class="form-group">
<label>邮箱（接收API Key）</label>
<input type="email" id="email" placeholder="xxx@email.com" required>
</div>

<div class="form-group">
<label>姓名</label>
<input type="text" id="name" placeholder="你的名字">
</div>

<div class="form-group">
<label>手机号（可选）</label>
<input type="tel" id="phone" placeholder="方便顾问联系你">
</div>

<div class="form-group">
<label>公司/项目名（可选）</label>
<input type="text" id="company" placeholder="方便我们了解你">
</div>

<div class="form-group">
<label>付款备注/订单号（可选）</label>
<input type="text" id="orderNote" placeholder="支付时如有备注可填">
</div>

<button class="btn" id="submitBtn" onclick="submitOrder()">提交订单 →</button>

<p class="note">
提交后 <strong>API Key立即生成</strong>，同时发送到你的邮箱<br>

</p>
</div>

<div class="success" id="successView">
<div class="check">✅</div>
<h2>订单已提交！</h2>
<p>你的API Key已生成并发送到邮箱。<br>请查收（如未收到请检查垃圾邮件）。</p>

<div class="key-box">
<label>你的API Key（点击复制）：</label>
<div class="key-value" id="keyDisplay" onclick="copyKey()"></div>
<p class="copy-hint">点击复制 · 请妥善保管</p>
</div>

<div class="api-doc">
<strong style="color:#ffd700">快速接入（3行代码）：</strong><br><br>
<code>base_url</code> = "https://api.shanhai-ai.com/v1"<br>
<code>api_key</code> = "你的Key"<br>
<code>model</code> = "auto"<br><br>
兼容OpenAI格式，改两行代码即可。
</div>

<p style="margin-top:20px">
<a href="/" style="color:#ffd700;text-decoration:underline">返回首页</a>
&nbsp;·&nbsp;
<a href="/chat.html" style="color:#ffd700;text-decoration:underline">需要帮助？问AI顾问</a>
</p>
</div>
</div>

<script>
function generateAPIKey(){
  var chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  var key='sk-ht-';
  for(var i=0;i<32;i++){key+=chars.charAt(Math.floor(Math.random()*chars.length))}
  return key;
}

function submitOrder(){
  var btn=document.getElementById('submitBtn');
  btn.disabled=true;
  btn.textContent='提交中...';
  
  var email=document.getElementById('email').value.trim();
  if(!email||email.indexOf('@')===-1){alert('请填写有效邮箱');btn.disabled=false;btn.textContent='提交订单 →';return}
  var name=document.getElementById('name').value.trim()||'未填写';
  var plan=document.getElementById('plan').value;
  var phone=document.getElementById('phone').value.trim()||'未填写';
  var company=document.getElementById('company').value.trim()||'未填写';
  var orderNote=document.getElementById('orderNote').value.trim()||'无';
  
  // 自动生成API Key
  var apiKey=generateAPIKey();
  var orderId='HT'+Date.now().toString(36).toUpperCase();
  var submitTime=new Date().toLocaleString('zh-CN');
  
  // 通过formsubmit.co提交到主人邮箱（含API Key）
  var payload={
    _subject:'【唤通订单·自动发Key】'+plan+' - '+name+' - '+email,
    _template:'table',
    _captcha:'false',
    '订单编号':orderId,
    '套餐':plan,
    '姓名':name,
    '邮箱':email,
    '手机':phone,
    '公司':company,
    '备注':orderNote,
    'API Key':apiKey,
    '提交时间':submitTime,
    '来源':'order.html'
  };
  
  // 异步提交到formsubmit
  fetch('https://formsubmit.co/ajax/746876121@qq.com',{
    method:'POST',
    headers:{'Content-Type':'application/json','Accept':'application/json'},
    body:JSON.stringify(payload)
  }).catch(function(){});
  
  // 同时通过formsubmit给客户发一封Key邮件（通过_autoresponse）
  var clientPayload={
    _subject:'你的唤通API Key已生成 - 订单'+orderId,
    _template:'table',
    _captcha:'false',
    _autoresponse:'感谢订购唤通API！\n\n你的API Key：'+apiKey+'\n订单编号：'+orderId+'\n套餐：'+plan+'\n\n快速接入（3行代码）：\nbase_url = "https://api.shanhai-ai.com/v1"\napi_key = "'+apiKey+'"\nmodel = "auto"\n\n兼容OpenAI格式，Python/Node/Java都有SDK。\n如有问题请回复此邮件或访问 shanhai-geo.top/chat.html 咨询。',
    '姓名':name,
    '你的API Key':apiKey,
    '订单编号':orderId,
    '套餐':plan,
    '接入地址':'https://api.shanhai-ai.com/v1',
    '使用文档':'shanhai-geo.top'
  };
  
  // 发送自动回复邮件给客户
  fetch('https://formsubmit.co/ajax/'+email,{
    method:'POST',
    headers:{'Content-Type':'application/json','Accept':'application/json'},
    body:JSON.stringify(clientPayload)
  }).catch(function(){});
  
  // 本地存储订单
  try{
    var orders=JSON.parse(localStorage.getItem('shanhai_orders')||'[]');
    orders.push({id:orderId,plan:plan,name:name,email:email,phone:phone,company:company,note:orderNote,key:apiKey,time:new Date().toISOString()});
    localStorage.setItem('shanhai_orders',JSON.stringify(orders));
  }catch(e){}
  
  // 显示成功页面+Key
  setTimeout(function(){
    document.getElementById('formView').style.display='none';
    document.getElementById('successView').style.display='block';
    document.getElementById('keyDisplay').textContent=apiKey;
  },800);
}

function copyKey(){
  var key=document.getElementById('keyDisplay').textContent;
  navigator.clipboard.writeText(key).then(function(){
    document.querySelector('.copy-hint').textContent='已复制！';
    setTimeout(function(){document.querySelector('.copy-hint').textContent='点击复制 · 请妥善保管'},2000);
  });
}

// 从URL参数自动选择套餐
var params=new URLSearchParams(location.search);
var p=params.get('plan');
if(p){document.getElementById('plan').value=p}

// 数据追踪：记录页面访问
try{navigator.sendBeacon('https://formsubmit.co/ajax/746876121@qq.com',JSON.stringify({
  _subject:'【唤通追踪】订单页访问',
  来源:document.referrer||'直接访问',
  套餐:params.get('plan')||'未指定',
  时间:new Date().toLocaleString('zh-CN')
}))}catch(e){}
</script>

<!-- AI客服浮动入口 -->
<style>
.float-chat{position:fixed;bottom:20px;right:20px;z-index:999;background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;padding:14px 24px;border-radius:30px;text-decoration:none;font-weight:bold;font-size:14px;box-shadow:0 4px 20px rgba(255,215,0,.4);animation:chatPulse 2s infinite}
@keyframes chatPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
</style>
<a href="/chat.html" class="float-chat">💬 需要帮助？问AI顾问</a>
</body>
</html>
